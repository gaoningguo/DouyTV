name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# 同一分支/tag 重复 push 时取消上一次未完成的 run，节约 Actions 配额
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: write   # tauri-action / softprops/action-gh-release 需要写 Releases

jobs:
  # ===========================================================================
  # 桌面端构建 — Windows / macOS (Apple Silicon + Intel) / Linux
  # 产物: .msi / .exe (Win), .dmg / .app (mac), .deb / .AppImage / .rpm (linux)
  # ===========================================================================
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            label: windows
            rust-targets: ""
          - platform: ubuntu-22.04
            args: ""
            label: linux
            rust-targets: ""
          - platform: macos-14
            args: "--target aarch64-apple-darwin"
            label: macos-arm64
            rust-targets: aarch64-apple-darwin
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
            label: macos-intel
            rust-targets: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Linux: Tauri v2 推荐 WebKit2GTK 4.1 + libsoup3 + JavaScriptCore 4.1
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            file \
            wget \
            xdg-utils

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.label }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & (on tag) publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "DouyTV ${{ github.ref_name }}"
          releaseBody: |
            ## DouyTV ${{ github.ref_name }}

            从下方 Assets 下载对应平台的安装包：

            | 平台 | 文件 |
            | --- | --- |
            | Windows 64 位 | `.msi` 或 `.exe` (NSIS) |
            | macOS Apple Silicon | `*_aarch64.dmg` |
            | macOS Intel | `*_x64.dmg` |
            | Linux | `.deb` / `.AppImage` / `.rpm` |
            | Android | `*-universal-release-unsigned.apk`（需在手机开启「未知来源」） |
            | iOS | `*.ipa`（实验性 — 无 Apple Developer 证书可能 build 失败） |
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload build artifacts (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: douytv-${{ matrix.label }}-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/
            src-tauri/target/*/release/bundle/
          if-no-files-found: ignore
          retention-days: 14

  # ===========================================================================
  # Android — 在 CI 上 init + build APK
  # 产物：universal + per-ABI 的 unsigned APK
  # ===========================================================================
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;27.0.12077973

      - name: Export Android env
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: android

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # 项目仓库未带 src-tauri/gen/android（移动端目录通常本地生成），CI 上 init 一次
      - name: Initialize Android project
        run: pnpm tauri android init

      - name: Build Android APK
        run: pnpm tauri android build --apk --split-per-abi
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_ROOT }}

      - name: Locate built APKs
        id: apks
        run: |
          set -e
          mkdir -p artifacts
          find src-tauri/gen/android -type f -name "*.apk" -print -exec cp {} artifacts/ \;
          ls -la artifacts/

      - name: Upload APK artifacts (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: douytv-android-${{ github.sha }}
          path: artifacts/*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Publish APKs to GitHub Releases (on tag)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          draft: true
          name: "DouyTV ${{ github.ref_name }}"

  # ===========================================================================
  # iOS — 在 CI 上 init + build (实验性，无 Apple Developer 证书会失败)
  # 没有 APPLE_TEAM_ID secret 时跳过，避免占用 macOS runner 配额
  # ===========================================================================
  build-ios:
    runs-on: macos-14
    if: ${{ vars.ENABLE_IOS_BUILD == 'true' }}
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Setup Rust + iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ios

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize iOS project
        run: pnpm tauri ios init

      - name: Build iOS App (development export)
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
        run: pnpm tauri ios build --export-method development

      - name: Locate built IPAs
        run: |
          set -e
          mkdir -p artifacts
          find src-tauri/gen/apple -type f \( -name "*.ipa" -o -name "*.app" \) -print -exec cp -R {} artifacts/ \; || true
          ls -la artifacts/ || true

      - name: Upload IPA artifacts (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: douytv-ios-${{ github.sha }}
          path: artifacts/*
          if-no-files-found: warn
          retention-days: 14

      - name: Publish IPA to GitHub Releases (on tag)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.ipa
          draft: true
          name: "DouyTV ${{ github.ref_name }}"
