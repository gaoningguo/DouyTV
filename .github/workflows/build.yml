name: Release DouyTV

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  # ---------------------------------------------
  # 1. 准备阶段：提取标签版本号
  # ---------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------
  # 2. 桌面端构建 (Windows, Linux, macOS)
  # ---------------------------------------------
  tauri:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            artifact_glob: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            label: macos
            artifact_glob: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - os: ubuntu-22.04
            label: linux
            artifact_glob: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        run: pnpm tauri build

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: DouyTV ${{ needs.prepare.outputs.tag }}
          files: ${{ matrix.artifact_glob }}
          fail_on_unmatched_files: false

  # ---------------------------------------------
  # 3. 安卓端构建 (Android APK)
  # ---------------------------------------------
  android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      
      - uses: android-actions/setup-android@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Init Android Project
        run: pnpm tauri android init

      - name: Build Android APK
        run: pnpm tauri android build --apk

      - name: Rename APK
        run: |
          mkdir -p out
          APK_FILE=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | head -n 1)
          cp "$APK_FILE" "out/douytv-android-${{ needs.prepare.outputs.tag }}.apk"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: DouyTV ${{ needs.prepare.outputs.tag }}
          files: out/douytv-android-*.apk
          fail_on_unmatched_files: true

  # ---------------------------------------------
  # 4. iOS端免签构建 (iOS Unsigned IPA)
  # ---------------------------------------------
  ios-unsigned:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Init iOS Project
        run: pnpm tauri ios init

      - name: Pod install
        working-directory: src-tauri/gen/ios/App
        run: pod install --repo-update

      - name: Archive (unsigned)
        working-directory: src-tauri/gen/ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/App.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO

      - name: Package unsigned IPA
        working-directory: src-tauri/gen/ios/App
        run: |
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/App.app build/Payload/
          cd build && zip -qr "../../../../../douytv-ios-unsigned-${{ needs.prepare.outputs.tag }}.ipa" Payload

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: DouyTV ${{ needs.prepare.outputs.tag }}
          files: douytv-ios-unsigned-*.ipa
          fail_on_unmatched_files: true
          body: |
            ## 下载说明

            - **Windows**：`*.msi` 或 `*.exe`（未做代码签名，首次运行 SmartScreen 会提示「更多信息 → 仍要运行」）。
            - **macOS**：`*.dmg`（未做公证，首次打开请右键 → 打开，或在「系统设置 → 隐私与安全」中允许）。
            - **Linux**：`*.AppImage`（赋予可执行权限后直接运行）或 `*.deb`（`sudo dpkg -i`）。
            - **Android**：`*.apk`，Debug 或未签名，可直接侧载安装。
            - **iOS（未签名）**：`*.ipa` **不能直接拖到手机安装**。需要使用 [Sideloadly](https://sideloadly.io/) 或 [AltStore](https://altstore.io/) 配合你自己的 Apple ID 重签后侧载安装，重签后有效期 7 天，到期需重新操作。