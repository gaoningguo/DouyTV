name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            label: windows
          - platform: ubuntu-22.04
            args: ""
            label: linux
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            label: macos-arm64
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            label: macos-intel

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.label }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & (on tag) publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "DouyTV ${{ github.ref_name }}"
          releaseBody: "See the assets below to download this version."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload build artifacts (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: douytv-${{ matrix.label }}-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/
            src-tauri/target/*/release/bundle/
          if-no-files-found: ignore
          retention-days: 14
