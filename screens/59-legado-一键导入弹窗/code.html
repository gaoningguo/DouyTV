<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Legado Import Modal</title>
<!-- Material Symbols -->

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "surface-container": "#201f1f",
                        "primary": "#cffffb",
                        "tertiary": "#f5f5f5",
                        "surface": "#131313",
                        "outline": "#849492",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed": "#1a1c1c",
                        "surface-tint": "#00ddd6",
                        "primary-container": "#00f2ea",
                        "on-error-container": "#ffdad6",
                        "on-tertiary": "#2f3131",
                        "surface-container-lowest": "#0e0e0e",
                        "primary-fixed": "#29fcf3",

                    "fontFamily": {

<style>
        body {
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 0%, #00201e 0%, transparent 70%);
            min-height: 100vh;
        }
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(0, 221, 214, 0.4);
        }
        .neon-text-glow {
            text-shadow: 0 0 8px rgba(0, 221, 214, 0.6);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface antialiased flex items-center justify-center p-md">
<!-- Modal Backdrop -->
<div aria-hidden="true" class="fixed inset-0 z-40 bg-black/70 backdrop-blur-sm"></div>
<!-- Modal Container -->
<div class="relative z-50 w-full max-w-md bg-surface/80 backdrop-blur-xl rounded-xl border border-primary/30 shadow-[0_0_40px_rgba(0,221,214,0.15)] flex flex-col overflow-hidden animate-[fadeIn_0.3s_ease-out]">
<!-- Header -->
<div class="px-lg pt-lg pb-md flex items-center gap-sm border-b border-white/5">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary neon-glow">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">data_exploration</span>
</div>
<div>
<h2 class="font-title-md text-title-md text-on-surface">Legado Import</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Import your book sources and rules from Legado configuration files or URLs.</p>
</div>
</div>
<!-- Content Body -->
<div class="p-lg flex flex-col gap-lg overflow-y-auto max-h-[530px]">
<!-- URL Input Section -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-primary neon-text-glow">Config URL</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-on-surface-variant/50 text-[18px] pointer-events-none">link</span>
<input class="w-full bg-white/5 border border-transparent rounded-lg py-3 pl-10 pr-20 font-body-sm text-body-sm text-on-surface placeholder:text-on-surface-variant/40 focus:bg-white/10 focus:border-primary/50 focus:outline-none transition-all focus:ring-0" placeholder="https://example.com/sources.json" type="url"/>
<button class="absolute right-xs top-1/2 -translate-y-1/2 px-sm py-1.5 rounded-md bg-primary/10 text-primary font-label-caps text-label-caps hover:bg-primary/20 transition-colors">
                        PASTE
                    </button>
</div>
</div>
<!-- Divider -->
<div class="flex items-center gap-md py-sm">
<div class="h-px bg-white/10 flex-1"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant/50 uppercase">or local file</span>
<div class="h-px bg-white/10 flex-1"></div>
</div>
<!-- File Upload Button -->
<button class="w-full py-4 rounded-lg bg-surface-variant/30 border border-white/10 hover:border-primary/40 hover:bg-surface-variant/50 flex flex-col items-center justify-center gap-xs transition-all group">
<span class="material-symbols-outlined text-primary text-2xl group-hover:scale-110 transition-transform">folder_zip</span>
<span class="font-title-md text-title-md text-on-surface mt-sm">Choose File</span>
<span class="font-body-sm text-body-sm text-on-surface-variant/60">Supports .json, .txt, .zip</span>
</button>
<!-- Recent URLs Section -->
<div class="flex flex-col gap-sm mt-sm">
<h3 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Recently Used URLs</h3>
<div class="flex flex-col gap-xs">
<!-- Recent Item 1 -->
<button class="flex items-center gap-sm p-sm rounded-lg hover:bg-white/5 transition-colors text-left w-full group">
<span class="material-symbols-outlined text-on-surface-variant/50 text-[16px] group-hover:text-primary transition-colors">history</span>
<span class="font-body-sm text-body-sm text-on-surface-variant truncate flex-1 group-hover:text-on-surface transition-colors">https://raw.githubusercontent.com/user/legado/main/sources.json</span>
</button>
<!-- Recent Item 2 -->
<button class="flex items-center gap-sm p-sm rounded-lg hover:bg-white/5 transition-colors text-left w-full group">
<span class="material-symbols-outlined text-on-surface-variant/50 text-[16px] group-hover:text-primary transition-colors">history</span>
<span class="font-body-sm text-body-sm text-on-surface-variant truncate flex-1 group-hover:text-on-surface transition-colors">https://gitee.com/repo/raw/master/booksource.txt</span>
</button>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="p-lg pt-md flex items-center justify-end gap-md bg-surface-container-low/50 border-t border-white/5">
<button class="px-lg py-2.5 rounded-full font-label-caps text-label-caps text-on-surface-variant hover:text-on-surface hover:bg-white/5 transition-colors">
                CANCEL
            </button>
<button class="px-lg py-2.5 rounded-full font-label-caps text-label-caps bg-primary text-on-primary hover:bg-primary-container neon-glow transition-all active:scale-95">
                IMPORT NOW
            </button>
</div>
</div>
<script>
        // Simple animation injection for initial load
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeIn {
                from { opacity: 0; transform: scale(0.95) translateY(10px); }
                to { opacity: 1; transform: scale(1) translateY(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body></html>
