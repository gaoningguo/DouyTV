<script>
    const webToggle = document.getElementById('web-live-toggle');
    const iptvToggle = document.getElementById('iptv-toggle');
    const platformBar = document.getElementById('platform-bar');
    const channelBar = document.getElementById('channel-bar');

    function setActive(type) {
        if (type === 'web') {
            webToggle.classList.add('bg-primary-container', 'text-on-primary-container', 'font-bold', 'shadow-lg', 'shadow-primary-container/20');
            webToggle.classList.remove('text-on-surface-variant', 'font-medium');
            iptvToggle.classList.remove('bg-primary-container', 'text-on-primary-container', 'font-bold', 'shadow-lg', 'shadow-primary-container/20');
            iptvToggle.classList.add('text-on-surface-variant', 'font-medium');
            
            platformBar.classList.remove('hidden');
            channelBar.classList.add('hidden');
        } else {
            iptvToggle.classList.add('bg-primary-container', 'text-on-primary-container', 'font-bold', 'shadow-lg', 'shadow-primary-container/20');
            iptvToggle.classList.remove('text-on-surface-variant', 'font-medium');
            webToggle.classList.remove('bg-primary-container', 'text-on-primary-container', 'font-bold', 'shadow-lg', 'shadow-primary-container/20');
            webToggle.classList.add('text-on-surface-variant', 'font-medium');
            
            platformBar.classList.add('hidden');
            channelBar.classList.remove('hidden');
        }
    }

    webToggle.addEventListener('click', () => setActive('web'));
    iptvToggle.addEventListener('click', () => setActive('iptv'));

    // Secondary bar selection logic
    const secondaryButtons = document.querySelectorAll('#platform-bar button, #channel-bar button');
    secondaryButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            const parent = this.parentElement;
            parent.querySelectorAll('button').forEach(b => {
                b.classList.remove('bg-surface-container-high', 'text-primary', 'border-primary/20');
                b.classList.add('bg-surface-container', 'text-on-surface-variant', 'border-transparent');
            });
            this.classList.add('bg-surface-container-high', 'text-primary', 'border-primary/20');
            this.classList.remove('bg-surface-container', 'text-on-surface-variant', 'border-transparent');
        });
    });
</script>
