<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Music Player Detail</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        /* Essential base font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .spin-slow {
            animation: spin 10s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .pulse-subtle {
            animation: pulse-op 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-op {
            0%, 100% { opacity: 1; }
            50% { opacity: .6; }
        }

        /* Glassmorphism helpers */
        .glass-panel {
            background: rgba(18, 18, 18, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Progress bar glow */
        .progress-glow {
            box-shadow: 0 0 10px rgba(0, 242, 234, 0.5);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#00ddd6",
                        "on-background": "#e5e2e1",
                        "surface-container-highest": "#353534",
                        "secondary-fixed-dim": "#ffb2b6",
                        "on-secondary-container": "#5b0016",
                        "inverse-primary": "#006a66",
                        "on-tertiary-fixed-variant": "#454747",
                        "surface-dim": "#131313",
                        "outline-variant": "#3a4a48",
                        "on-primary-fixed-variant": "#00504d",
                        "surface-bright": "#3a3939",
                        "on-error-container": "#ffdad6",
                        "error": "#ffb4ab",
                        "background": "#131313",
                        "surface-container-high": "#2a2a2a",
                        "on-error": "#690005",
                        "primary-fixed": "#29fcf3",
                        "primary": "#cffffb",
                        "outline": "#849492",
                        "on-surface": "#e5e2e1",
                        "secondary": "#ffb2b6",
                        "on-primary-container": "#006a66",
                        "on-secondary-fixed": "#40000d",
                        "on-secondary": "#67001b",
                        "surface-container-lowest": "#0e0e0e",
                        "inverse-surface": "#e5e2e1",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-primary-fixed": "#00201e",
                        "on-tertiary-container": "#5d5f5f",
                        "on-secondary-fixed-variant": "#920029",
                        "surface-variant": "#353534",
                        "secondary-fixed": "#ffdadb",
                        "tertiary": "#f5f5f5",
                        "secondary-container": "#ff516a",
                        "primary-container": "#00f2ea",
                        "inverse-on-surface": "#313030",
                        "tertiary-fixed": "#e2e2e2",
                        "surface": "#131313",
                        "on-surface-variant": "#b9cac8",
                        "primary-fixed-dim": "#00ddd6",
                        "on-tertiary-fixed": "#1a1c1c",
                        "on-tertiary": "#2f3131",
                        "error-container": "#93000a",
                        "surface-container": "#201f1f",
                        "on-primary": "#003735",
                        "tertiary-container": "#d9d9d9",
                        "surface-container-low": "#1c1b1b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "safe-area-inset": "max(16px, env(safe-area-inset-bottom))",
                        "xs": "4px",
                        "md": "16px",
                        "base": "4px",
                        "xl": "32px",
                        "sm": "8px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "title-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-sm": ["Inter"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", { "lineHeight": "52px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "title-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface h-screen w-full overflow-hidden flex flex-col font-body-lg">
<!-- Background Blur Canvas (Optional depth layer) -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-primary-container via-surface to-background blur-3xl"></div>
<!-- TopAppBar -->
<header class="relative z-50 flex justify-between items-center px-md py-sm w-full bg-transparent bg-gradient-to-b from-black/80 to-transparent">
<button class="text-primary-fixed-dim hover:text-primary transition-colors duration-200 active:scale-95 transition-transform flex items-center justify-center p-sm">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile uppercase tracking-tighter text-primary-fixed-dim drop-shadow-[0_0_8px_rgba(0,221,214,0.6)]">Cyberpunk Night</h1>
<button class="text-primary-fixed-dim hover:text-primary transition-colors duration-200 active:scale-95 transition-transform flex items-center justify-center p-sm">
<span class="material-symbols-outlined text-[24px]">share</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-1 flex flex-col items-center justify-between px-md py-lg w-full max-w-[600px] mx-auto overflow-y-auto pb-safe-area-inset">
<!-- Artwork Section -->
<div class="relative w-full max-w-[320px] aspect-square mt-xl mb-lg flex items-center justify-center group">
<!-- Glow Effect behind -->
<div class="absolute inset-0 rounded-full bg-primary-container/20 blur-2xl group-hover:bg-primary-container/30 transition-colors duration-500"></div>
<!-- Rotating Vinyl/Visualizer -->
<div class="relative w-full h-full rounded-full border-4 border-primary-container spin-slow shadow-[0_0_30px_rgba(0,242,234,0.4)] overflow-hidden">
<img alt="Neon Walker Artwork" class="w-full h-full object-cover" data-alt="A highly detailed, neon-soaked cyberpunk cityscape at night, serving as abstract album cover art. Vibrant cyan and magenta lights reflect off wet dark streets in a rainy, futuristic metropolis. High contrast, high energy aesthetic fitting a digital electronic music genre. Immersive dark mode mood." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB_XeZKAHBcxyuBziseqZy-doyE79xujimEqgEO5SBpMTRTvMxl7LVHUk12Fp3Y5EeOJumUjjtW697DVbkM2RvXY-TlHBpdTCP64Z83a5US-snvWvZg4VOle6aArtSJq_HxoOWERNFdhGlryx0YKnVn6VuPOXiJBL_TLVVoIBY24jyKll1j--HmiWjb3f_Gl5YpmusBwxqaeO0QvjGejtFNKsW6Vcbn8CKoIR8IH2b1F83cA0aEWihINC7qB3WXcjsnKObRVEBRpoc"/>
<!-- Center Hole -->
<div class="absolute inset-0 m-auto w-12 h-12 bg-surface rounded-full border-2 border-primary-container/50 z-10 shadow-inner flex items-center justify-center">
<div class="w-4 h-4 bg-background rounded-full"></div>
</div>
</div>
</div>
<!-- Info & Lyrics Preview -->
<div class="w-full flex flex-col items-center text-center mb-lg space-y-sm">
<div class="flex items-center space-x-sm">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Neon Walker</h2>
<span class="px-2 py-1 bg-surface-container-high rounded font-label-caps text-label-caps text-primary-fixed-dim tracking-widest border border-primary-fixed-dim/30">HI-RES</span>
</div>
<p class="font-title-md text-title-md text-on-surface-variant">@Digital Mirage</p>
<!-- Subtle Lyric preview -->
<div class="mt-md px-md py-sm rounded-lg glass-panel max-w-[80%]">
<p class="font-body-sm text-body-sm text-primary pulse-subtle italic">"Running through the grid of light..."</p>
</div>
</div>
<!-- Playback Controls Ecosystem -->
<div class="w-full flex flex-col space-y-lg w-full mb-lg">
<!-- Progress Bar -->
<div class="w-full flex flex-col space-y-sm group cursor-pointer">
<div class="w-full h-1 bg-surface-container-highest rounded-full relative overflow-hidden transition-all duration-200 group-hover:h-2">
<div class="absolute top-0 left-0 h-full bg-primary-container w-1/3 progress-glow"></div>
</div>
<div class="flex justify-between font-label-caps text-label-caps text-on-surface-variant">
<span>01:24</span>
<span>03:45</span>
</div>
</div>
<!-- Main Controls -->
<div class="flex justify-between items-center w-full px-md">
<button class="text-on-surface-variant hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined text-[28px]">shuffle</span>
</button>
<button class="text-on-surface hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined text-[40px]">skip_previous</span>
</button>
<!-- Play/Pause FAB style -->
<button class="w-16 h-16 rounded-full bg-primary-container text-surface flex items-center justify-center shadow-[0_0_20px_rgba(0,242,234,0.6)] hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-[36px]" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="text-on-surface hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined text-[40px]">skip_next</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined text-[28px]">repeat</span>
</button>
</div>
</div>
<!-- Bottom Actions (Glassmorphism bar) -->
<div class="w-full glass-panel rounded-2xl flex justify-around items-center py-sm px-md mb-safe-area-inset">
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 space-y-xs">
<span class="material-symbols-outlined text-[24px]">download</span>
<span class="font-label-caps text-label-caps text-[10px]">SAVE</span>
</button>
<button class="flex flex-col items-center justify-center text-primary-fixed-dim drop-shadow-[0_0_5px_rgba(0,221,214,0.8)] active:scale-90 space-y-xs">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">lyrics</span>
<span class="font-label-caps text-label-caps text-[10px]">LYRICS</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 space-y-xs">
<span class="material-symbols-outlined text-[24px]">timer</span>
<span class="font-label-caps text-label-caps text-[10px]">TIMER</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 space-y-xs">
<span class="material-symbols-outlined text-[24px]">queue_music</span>
<span class="font-label-caps text-label-caps text-[10px]">QUEUE</span>
</button>
</div>
</main>
</body></html>
