<style>
        /* Custom styles for neon effects and glassmorphism not easily achieved with tailwind utilities alone */
        .glass-panel {
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .neon-border-top {
            box-shadow: inset 0 1px 0 rgba(0, 221, 214, 0.3), 0 -4px 16px -4px rgba(0, 221, 214, 0.2);
            border-top: 1px solid rgba(0, 221, 214, 0.4);
        }

        .neon-text-glow {
            text-shadow: 0 0 8px rgba(0, 221, 214, 0.6);
        }

        /* Custom Toggle Switch styling */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #00ddd6; /* primary-fixed-dim */
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: rgba(0, 221, 214, 0.2);
            border-color: rgba(0, 221, 214, 0.5);
            box-shadow: 0 0 8px rgba(0, 221, 214, 0.4);
        }
        .toggle-checkbox {
            right: 0;
            z-index: 1;
            border-color: #353534; /* surface-variant */
            transition: all 0.3s;
        }
        .toggle-label {
            width: 48px;
            height: 24px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 9999px;
            transition: all 0.3s;
        }
        .toggle-checkbox:checked::before {
            transform: translateX(24px);
            background-color: #00ddd6;
            box-shadow: 0 0 8px #00ddd6;
        }
        .toggle-checkbox::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background-color: #b9cac8; /* on-surface-variant */
            border-radius: 50%;
            transition: all 0.3s;
        }

        /* Custom Slider Styling */
        input[type=range] {
            -webkit-appearance: none; 
            width: 100%; 
            background: transparent; 
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #00ddd6;
            cursor: pointer;
            margin-top: -7px; 
            box-shadow: 0 0 10px rgba(0, 221, 214, 0.8);
            transition: transform 0.1s;
        }
        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.3);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 1px;
        }
        input[type=range]:focus {
            outline: none;
        }
        
        /* Hide scrollbar for horizontal lists */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>

<script>
        // Simple interactions for the UI
        document.addEventListener('DOMContentLoaded', () => {
            const densitySlider = document.getElementById('densitySlider');
            const densityTrack = document.getElementById('densityTrack');
            const densityValue = document.getElementById('densityValue');
            const danmakuToggle = document.getElementById('danmakuToggle');
            const danmakuControls = document.getElementById('danmakuControls');

            // Update slider filled track
            densitySlider.addEventListener('input', (e) => {
                const val = e.target.value;
                densityTrack.style.width = `${val}%`;
                densityValue.textContent = `${val}%`;
            });

            // Toggle controls visibility
            danmakuToggle.addEventListener('change', (e) => {
                if(e.target.checked) {
                    danmakuControls.style.opacity = '1';
                    danmakuControls.style.pointerEvents = 'auto';
                    densitySlider.disabled = false;
                } else {
                    danmakuControls.style.opacity = '0.3';
                    danmakuControls.style.pointerEvents = 'none';
                    densitySlider.disabled = true;
                }
            });

            // Simulated dismiss action (just visual for the demo)
            const closeBtn = document.querySelector('button[aria-label="Close settings"]');
            const scrim = document.getElementById('modalScrim');
            const sheet = document.getElementById('settingsSheet');

            const dismissModal = () => {
                sheet.classList.add('translate-y-full');
                scrim.classList.add('opacity-0');
                setTimeout(() => {
                    // In a real app, you'd unmount or hide here
                    // sheet.style.display = 'none';
                    // scrim.style.display = 'none';
                    
                    // Reset for demo purposes
                    setTimeout(() => {
                        sheet.classList.remove('translate-y-full');
                        scrim.classList.remove('opacity-0');
                    }, 1000);
                }, 300);
            };

            closeBtn.addEventListener('click', dismissModal);
            scrim.addEventListener('click', dismissModal);
        });
    </script>
