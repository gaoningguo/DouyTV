<!-- Inline Script for Spectrum Visualization -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('spectrum-container');
            const numBars = 40;
            
            for (let i = 0; i < numBars; i++) {
                const bar = document.createElement('div');
                // Base styling for bar
                bar.className = 'w-full bg-primary-fixed-dim spectrum-bar rounded-t-sm opacity-80';
                
                // Randomize animation duration and delay to make it look organic
                const duration = 0.4 + Math.random() * 0.8;
                const delay = Math.random() * -2;
                
                // Higher bars in middle, lower on edges generally
                const heightPercentage = 20 + Math.random() * 80;
                
                bar.style.height = `${heightPercentage}%`;
                bar.style.animationDuration = `${duration}s`;
                bar.style.animationDelay = `${delay}s`;
                
                // Add a subtle color shift for variety
                if (Math.random() > 0.8) {
                    bar.classList.replace('bg-primary-fixed-dim', 'bg-primary');
                }
                
                container.appendChild(bar);
            }
        });
    </script>
