<script>
        // Simple Tab Logic
        const tabBasic = document.getElementById('tab-basic');
        const tabAdvanced = document.getElementById('tab-advanced');
        const contentBasic = document.getElementById('content-basic');
        const contentAdvanced = document.getElementById('content-advanced');

        function switchTab(activeTab, inactiveTab, showContent, hideContent) {
            // Update Tab Styles
            activeTab.classList.add('tab-active');
            activeTab.classList.remove('text-on-surface-variant', 'border-transparent');
            
            inactiveTab.classList.remove('tab-active');
            inactiveTab.classList.add('text-on-surface-variant', 'border-transparent');

            // Update Content Visibility
            showContent.classList.remove('hidden');
            showContent.classList.add('animate-[fadeIn_0.3s_ease-out]');
            hideContent.classList.add('hidden');
            hideContent.classList.remove('animate-[fadeIn_0.3s_ease-out]');
        }

        tabBasic.addEventListener('click', () => {
            switchTab(tabBasic, tabAdvanced, contentBasic, contentAdvanced);
        });

        tabAdvanced.addEventListener('click', () => {
            switchTab(tabAdvanced, tabBasic, contentAdvanced, contentBasic);
        });
    </script>
