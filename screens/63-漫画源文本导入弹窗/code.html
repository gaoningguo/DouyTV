<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>文本导入 - 漫画源</title>

                        "on-tertiary": "#2f3131",
                        "on-background": "#e5e2e1",
                        "background": "#131313",
                        "on-error": "#690005",
                        "on-primary-container": "#006a66",
                        "surface": "#131313",
                        "on-secondary-fixed": "#40000d",
                        "tertiary-fixed-dim": "#c6c6c7",

                        "on-primary-fixed": "#00201e",
                        "surface-container-lowest": "#0e0e0e",
                        "tertiary": "#f5f5f5",
                        "on-surface": "#e5e2e1",
                        "surface-tint": "#00ddd6",
                        "inverse-primary": "#006a66",

                        "outline": "#849492",
                        "outline-variant": "#3a4a48",
                        "on-tertiary-fixed-variant": "#454747",
                        "inverse-on-surface": "#313030",
                        "primary": "#cffffb",
                        "on-tertiary-fixed": "#1a1c1c",
                        "on-tertiary-container": "#5d5f5f",
                        "secondary-container": "#ff516a",
                        "tertiary-container": "#d9d9d9",
                        "on-primary": "#003735",
                        "surface-variant": "#353534",
                        "secondary-fixed-dim": "#ffb2b6",

<style>
        body {
            background-color: #050505; /* Level 0 Background */
        }
        .glass-panel {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(0, 242, 234, 0.3), inset 0 0 10px rgba(0, 242, 234, 0.1);
            border: 1px solid rgba(0, 242, 234, 0.2);
        }
        .immersive-input {
            background: rgba(255, 255, 255, 0.12);
            transition: background 0.3s ease;
        }
        .immersive-input:focus {
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            box-shadow: 0 0 10px rgba(0, 242, 234, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface h-screen w-screen flex items-center justify-center p-md overflow-hidden relative">
<!-- Background Texture/Atmosphere -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20" style="background-image: radial-gradient(circle at 50% 50%, #00f2ea 0%, transparent 60%); blur(100px);"></div>
<!-- Modal Container -->
<div class="glass-panel neon-border rounded-xl w-full max-w-[600px] flex flex-col z-10 relative overflow-hidden transform transition-all shadow-2xl">
<!-- Header -->
<div class="flex justify-between items-center px-lg py-md border-b border-white/10">
<h2 class="font-title-md text-title-md text-primary-fixed-dim">文本导入</h2>
<button class="text-on-surface-variant hover:text-primary transition-colors active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
<!-- Content Area -->
<div class="p-lg flex-grow flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-xs" for="import-text">源规则或链接列表</label>
<textarea class="immersive-input w-full rounded-lg p-md font-body-sm text-body-sm text-on-surface placeholder-on-surface-variant/50 border-none resize-none focus:ring-0" id="import-text" placeholder="在此粘贴 JSON 格式的源规则或链接列表..." rows="10"></textarea>
</div>
<!-- Footer / Action Area -->
<div class="px-lg py-md border-t border-white/10 flex justify-end gap-md">
<button class="px-lg py-sm rounded-lg font-title-md text-title-md text-on-surface-variant bg-surface-container hover:bg-surface-container-high transition-colors active:scale-95 border border-white/10">
                取消
            </button>
<button class="px-lg py-sm rounded-lg font-title-md text-title-md text-primary-fixed-dim bg-primary-fixed-dim/20 hover:bg-primary-fixed-dim/30 border border-primary-fixed-dim/50 shadow-[0_0_15px_rgba(0,221,214,0.4)] transition-all active:scale-95 flex items-center gap-xs">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">download</span>
                解析并导入
            </button>
</div>
</div>
<!-- JavaScript for subtle interactions -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const textarea = document.getElementById('import-text');
            const modal = document.querySelector('.glass-panel');

            // Subtle glow effect following cursor on the modal border
            modal.addEventListener('mousemove', (e) => {
                const rect = modal.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                modal.style.boxShadow = `
                    0 0 15px rgba(0, 242, 234, 0.3), 
                    inset 0 0 10px rgba(0, 242, 234, 0.1),
                    inset ${x - rect.width/2}px ${y - rect.height/2}px 50px rgba(0, 242, 234, 0.05)
                `;
            });

            modal.addEventListener('mouseleave', () => {
                modal.style.boxShadow = '0 0 15px rgba(0, 242, 234, 0.3), inset 0 0 10px rgba(0, 242, 234, 0.1)';
            });
        });
    </script>
</body></html>
