<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>全屏歌词模式</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#006a66",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-secondary-fixed-variant": "#920029",
                        "surface": "#131313",
                        "on-primary-container": "#006a66",
                        "surface-tint": "#00ddd6",
                        "surface-container-highest": "#353534",
                        "error": "#ffb4ab",
                        "outline-variant": "#3a4a48",
                        "on-tertiary": "#2f3131",
                        "tertiary": "#f5f5f5",
                        "background": "#131313",
                        "outline": "#849492",
                        "surface-container": "#201f1f",
                        "on-surface": "#e5e2e1",
                        "surface-dim": "#131313",
                        "error-container": "#93000a",
                        "tertiary-container": "#d9d9d9",
                        "on-secondary-fixed": "#40000d",
                        "secondary-fixed": "#ffdadb",
                        "on-tertiary-fixed": "#1a1c1c",
                        "inverse-on-surface": "#313030",
                        "surface-container-low": "#1c1b1b",
                        "on-background": "#e5e2e1",
                        "surface-container-high": "#2a2a2a",
                        "on-primary-fixed-variant": "#00504d",
                        "on-error-container": "#ffdad6",
                        "surface-container-lowest": "#0e0e0e",
                        "primary-container": "#00f2ea",
                        "primary-fixed": "#29fcf3",
                        "primary": "#cffffb",
                        "on-tertiary-container": "#5d5f5f",
                        "on-primary-fixed": "#00201e",
                        "on-secondary-container": "#5b0016",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "secondary-fixed-dim": "#ffb2b6",
                        "primary-fixed-dim": "#00ddd6",
                        "inverse-surface": "#e5e2e1",
                        "surface-variant": "#353534",
                        "surface-bright": "#3a3939",
                        "secondary": "#ffb2b6",
                        "tertiary-fixed": "#e2e2e2",
                        "secondary-container": "#ff516a",
                        "on-error": "#690005",
                        "on-primary": "#003735",
                        "on-surface-variant": "#b9cac8",
                        "on-secondary": "#67001b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "safe-area-inset": "max(16px, env(safe-area-inset-bottom))",
                        "xl": "32px",
                        "sm": "8px",
                        "lg": "24px",
                        "md": "16px",
                        "base": "4px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter", "sans-serif"],
                        "body-lg": ["Inter", "sans-serif"],
                        "label-caps": ["Inter", "sans-serif"],
                        "title-md": ["Inter", "sans-serif"],
                        "display-lg": ["Inter", "sans-serif"],
                        "body-sm": ["Inter", "sans-serif"],
                        "headline-lg-mobile": ["Inter", "sans-serif"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "title-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "52px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .blur-bg {
            filter: blur(100px);
            opacity: 0.6;
            transform: scale(1.2);
        }
        .lyric-active {
            text-shadow: 0 0 20px rgba(0, 221, 214, 0.8);
        }
        .progress-bar-hover:hover .progress-bar-inner {
            height: 6px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background h-screen w-screen overflow-hidden relative flex flex-col font-sans">
<!-- Blurred Background Aura -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-fixed-dim rounded-full mix-blend-screen blur-bg animate-pulse" style="animation-duration: 8s;"></div>
<div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-secondary-container rounded-full mix-blend-screen blur-bg animate-pulse" style="animation-duration: 12s; animation-delay: 2s;"></div>
<div class="absolute inset-0 bg-black/40"></div>
</div>
<!-- Top App Bar (From Shared Components) -->
<header class="fixed top-0 w-full z-50 bg-surface/10 dark:bg-surface/10 backdrop-blur-xl border-b border-white/10 shadow-[0_0_15px_rgba(0,221,214,0.1)] flex items-center justify-between px-md h-16 w-full">
<button class="text-on-surface-variant hover:bg-white/5 transition-colors active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">keyboard_arrow_down</span>
</button>
<div class="font-headline-lg-mobile text-headline-lg-mobile font-extrabold text-primary-fixed-dim tracking-tighter">
            NEON_AGGR
        </div>
<button class="text-on-surface-variant hover:bg-white/5 transition-colors active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">more_vert</span>
</button>
</header>
<!-- Lyrics Canvas -->
<main class="flex-1 z-10 flex flex-col justify-center items-center px-md mt-16 mb-[120px] relative overflow-hidden">
<!-- Faded Top/Bottom Masks for Lyrics Scroll -->
<div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-background to-transparent z-20 pointer-events-none"></div>
<div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-background to-transparent z-20 pointer-events-none"></div>
<div class="w-full max-w-2xl text-center space-y-lg relative transition-transform duration-500 ease-out translate-y-[-20%]">
<p class="font-headline-lg text-headline-lg text-on-surface-variant/40 transition-all duration-300 transform scale-90">
                回忆在黑夜里潜行
            </p>
<p class="font-headline-lg text-headline-lg text-on-surface-variant/60 transition-all duration-300 transform scale-95">
                霓虹闪烁刺痛了眼睛
            </p>
<!-- Active Line -->
<p class="font-display-lg text-display-lg text-primary-fixed-dim font-extrabold lyric-active transition-all duration-300 transform scale-100">
                穿越这座冰冷的城市
            </p>
<p class="font-headline-lg text-headline-lg text-on-surface-variant/60 transition-all duration-300 transform scale-95">
                寻找属于我们的频率
            </p>
<p class="font-headline-lg text-headline-lg text-on-surface-variant/40 transition-all duration-300 transform scale-90">
                时间仿佛在此刻静止
            </p>
<p class="font-headline-lg text-headline-lg text-on-surface-variant/20 transition-all duration-300 transform scale-85">
                只剩下心跳的声音
            </p>
</div>
</main>
<!-- Minimalist Playback Controls -->
<footer class="fixed bottom-0 w-full z-50 bg-surface/20 backdrop-blur-2xl border-t border-white/5 pb-safe-area-inset pt-md px-md flex flex-col gap-md">
<!-- Progress Bar -->
<div class="w-full flex items-center gap-sm progress-bar-hover cursor-pointer group">
<span class="font-label-caps text-label-caps text-on-surface-variant w-10 text-right">2:14</span>
<div class="flex-1 h-8 flex items-center relative">
<div class="w-full h-[2px] bg-white/10 rounded-full overflow-hidden absolute progress-bar-inner transition-all duration-200">
<div class="h-full bg-primary-fixed-dim w-[45%] relative shadow-[0_0_10px_rgba(0,221,214,0.8)]"></div>
</div>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant w-10 text-left">-1:42</span>
</div>
<!-- Controls -->
<div class="flex justify-between items-center w-full max-w-md mx-auto h-16">
<button class="text-on-surface-variant hover:text-primary-fixed-dim transition-colors p-2 active:scale-90">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">shuffle</span>
</button>
<button class="text-on-surface hover:text-primary-fixed-dim transition-colors p-2 active:scale-90">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">skip_previous</span>
</button>
<!-- Play/Pause Glass Button -->
<button class="w-16 h-16 rounded-full bg-white/10 border border-white/20 flex items-center justify-center text-primary-fixed-dim shadow-[0_0_20px_rgba(0,221,214,0.3)] hover:bg-white/20 hover:shadow-[0_0_30px_rgba(0,221,214,0.5)] transition-all active:scale-90">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="text-on-surface hover:text-primary-fixed-dim transition-colors p-2 active:scale-90">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">skip_next</span>
</button>
<button class="text-on-surface-variant hover:text-primary-fixed-dim transition-colors p-2 active:scale-90">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">repeat</span>
</button>
</div>
</footer>
</body></html>
