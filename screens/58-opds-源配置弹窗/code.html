<!DOCTYPE html>

<html class="dark" lang="en"><head>

                        "surface-tint": "#00ddd6",

                        "on-error-container": "#ffdad6",

<style>
        body { background-color: #050505; }
        .glass-sheet {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(0, 221, 214, 0.3);
        }
        .neon-glow-pink {
            box-shadow: 0 0 15px rgba(255, 81, 106, 0.3);
        }
        
        /* Custom Input Styling */
        input[type="text"], input[type="url"], input[type="password"] {
            background-color: rgba(255, 255, 255, 0.12);
            border: none;
            color: #e5e2e1;
        }
        input[type="text"]:focus, input[type="url"]:focus, input[type="password"]:focus {
            background-color: rgba(255, 255, 255, 0.20);
            box-shadow: none;
            outline: 1px solid #00ddd6;
        }
        
        /* Hide default scrollbar for sleekness */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background font-body-lg h-screen w-screen overflow-hidden flex items-end md:items-center justify-center p-0 md:p-lg relative">
<!-- Background Image (App Context) -->
<div class="absolute inset-0 z-0 opacity-30 bg-cover bg-center" data-alt="A dark, atmospheric digital environment featuring abstract, neon-lit geometric server racks receding into infinite depth. The lighting is dominated by deep blacks, vibrant cyan, and hot pink accents, reflecting a high-energy, immersive cyber aesthetic perfect for a digital media hub. The focus is soft, creating a blurred backdrop that allows foreground elements to stand out clearly." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBl2SJusKL-h7V0LQE6G36FUMySM9kN0qQObmr9-SeuR_jr2Bzpe8BBR0TjiLjJAaE4q7s3KYoktAS0w_rwwIekjKrSXW_K3swX6TVHWOFblJyTxBY3dMuySAcm9mVlwXd6uXiT7UrbebI2MpymQ-P3P4O0zSGPzHgdWIG2TanuFtbFv7Uz2R7XYalxjZan2YLIscna_f-aunjN-MPkg9-NJF2-dr9FB-iGskWJJ_IiBugBl6n2Sz4CpykF_la7dWHlSJJevVDF5iM');">
</div>
<!-- Modal Backdrop Overlay -->
<div class="absolute inset-0 z-10 bg-black/60 backdrop-blur-sm" id="modalBackdrop"></div>
<!-- Modal Content -->
<div class="relative z-20 w-full md:w-full md:max-w-md glass-sheet rounded-t-xl md:rounded-xl flex flex-col max-h-[795px] shadow-2xl animate-[slideUp_0.3s_ease-out]">
<!-- Drag Handle (Mobile only) -->
<div class="w-full flex justify-center pt-sm pb-base md:hidden">
<div class="w-12 h-1 bg-surface-variant rounded-full"></div>
</div>
<!-- Header -->
<div class="px-lg pt-sm md:pt-lg pb-md flex justify-between items-center border-b border-white/5">
<div>
<h2 class="font-title-md text-title-md text-primary drop-shadow-[0_0_8px_rgba(0,221,214,0.4)]">Add OPDS Source</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-base">Configure your catalog connection.</p>
</div>
<button class="p-2 rounded-full hover:bg-white/10 transition-colors text-on-surface-variant hover:text-on-surface active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
<!-- Form Body (Scrollable) -->
<div class="px-lg py-md overflow-y-auto flex-1 space-y-md">
<!-- Catalog Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="catalogName">Catalog Name</label>
<input class="rounded-lg px-md py-sm font-body-lg text-body-lg w-full transition-colors" id="catalogName" placeholder="e.g. Project Gutenberg" type="text" value="Neon Library"/>
</div>
<!-- Server URL -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="serverUrl">Server URL <span class="text-error">*</span></label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant pointer-events-none" style="font-size: 20px;">link</span>
<input class="rounded-lg pl-10 pr-md py-sm font-body-lg text-body-lg w-full transition-colors" id="serverUrl" placeholder="https://..." type="url" value="https://opds.neonstream.io/catalog.xml"/>
</div>
</div>
<!-- Authentication Section Divider -->
<div class="pt-sm pb-base">
<div class="flex items-center gap-sm">
<div class="h-[1px] bg-white/10 flex-1"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Authentication (Optional)</span>
<div class="h-[1px] bg-white/10 flex-1"></div>
</div>
</div>
<!-- Username -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="username">Username</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant pointer-events-none" style="font-size: 20px;">person</span>
<input class="rounded-lg pl-10 pr-md py-sm font-body-lg text-body-lg w-full transition-colors" id="username" placeholder="Leave blank if public" type="text"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Password / Token</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant pointer-events-none" style="font-size: 20px;">lock</span>
<input class="rounded-lg pl-10 pr-10 py-sm font-body-lg text-body-lg w-full transition-colors" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility</span>
</button>
</div>
</div>
<!-- Verify Connection Action -->
<div class="pt-sm">
<button class="w-full flex items-center justify-center gap-sm py-sm rounded-lg bg-surface-container-high hover:bg-surface-bright text-on-surface border border-white/5 transition-all active:scale-95 group" id="verifyBtn">
<span class="material-symbols-outlined text-primary group-hover:drop-shadow-[0_0_5px_rgba(0,221,214,0.8)]" style="font-variation-settings: 'FILL' 0;">bolt</span>
<span class="font-title-md text-[16px] leading-[24px]">Verify Connection</span>
</button>
<!-- Success Indicator (Hidden by default) -->
<div class="hidden mt-sm flex items-center gap-sm p-sm rounded-lg bg-primary/10 border border-primary/20 text-primary" id="verifySuccess">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-body-sm text-body-sm">Connection successful. 1,420 entries found.</span>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="px-lg py-md border-t border-white/5 flex gap-md pb-safe-area-inset">
<button class="flex-1 py-sm rounded-lg bg-surface-container hover:bg-surface-container-high text-on-surface transition-colors active:scale-95 font-title-md text-[16px] leading-[24px]">
                Cancel
            </button>
<button class="flex-1 py-sm rounded-lg bg-primary text-on-primary hover:bg-primary-container neon-glow transition-all active:scale-95 font-title-md text-[16px] leading-[24px] font-bold">
                Save Source
            </button>
</div>
</div>
<style>
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
<script>
        // Simple mock interaction for the verify button
        document.getElementById('verifyBtn').addEventListener('click', function() {
            const btn = this;
            const successMsg = document.getElementById('verifySuccess');
            const icon = btn.querySelector('.material-symbols-outlined');
            const text = btn.querySelector('span:not(.material-symbols-outlined)');
            
            // Loading state
            icon.textContent = 'sync';
            icon.classList.add('animate-spin');
            text.textContent = 'Verifying...';
            btn.classList.add('opacity-70', 'pointer-events-none');
            
            // Mock delay
            setTimeout(() => {
                // Reset button
                icon.textContent = 'bolt';
                icon.classList.remove('animate-spin');
                text.textContent = 'Verify Connection';
                btn.classList.remove('opacity-70', 'pointer-events-none');
                
                // Show success message
                successMsg.classList.remove('hidden');
                
                // Hide success message after a few seconds
                setTimeout(() => {
                    successMsg.classList.add('hidden');
                }, 4000);
            }, 1500);
        });
    </script>
</body></html>
