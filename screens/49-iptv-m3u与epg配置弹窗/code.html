<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>IPTV Configuration Modal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-background": "#e5e2e1",
                        "on-surface": "#e5e2e1",
                        "inverse-surface": "#e5e2e1",
                        "error": "#ffb4ab",
                        "on-secondary": "#67001b",
                        "on-tertiary-container": "#5d5f5f",
                        "secondary-container": "#ff516a",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "surface-container-lowest": "#0e0e0e",
                        "primary-container": "#00f2ea",
                        "primary": "#cffffb",
                        "on-secondary-fixed": "#40000d",
                        "surface-bright": "#3a3939",
                        "tertiary-fixed": "#e2e2e2",
                        "on-tertiary-fixed": "#1a1c1c",
                        "on-tertiary": "#2f3131",
                        "on-secondary-container": "#5b0016",
                        "on-secondary-fixed-variant": "#920029",
                        "on-primary-fixed-variant": "#00504d",
                        "on-error": "#690005",
                        "on-primary-container": "#006a66",
                        "secondary-fixed-dim": "#ffb2b6",
                        "outline-variant": "#3a4a48",
                        "inverse-on-surface": "#313030",
                        "surface-container-low": "#1c1b1b",
                        "secondary-fixed": "#ffdadb",
                        "on-primary-fixed": "#00201e",
                        "tertiary": "#f5f5f5",
                        "surface": "#131313",
                        "inverse-primary": "#006a66",
                        "surface-variant": "#353534",
                        "primary-fixed": "#29fcf3",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-primary": "#003735",
                        "error-container": "#93000a",
                        "outline": "#849492",
                        "background": "#131313",
                        "surface-tint": "#00ddd6",
                        "surface-dim": "#131313",
                        "primary-fixed-dim": "#00ddd6",
                        "surface-container-high": "#2a2a2a",
                        "surface-container": "#201f1f",
                        "secondary": "#ffb2b6",
                        "on-error-container": "#ffdad6",
                        "surface-container-highest": "#353534",
                        "tertiary-container": "#d9d9d9",
                        "on-surface-variant": "#b9cac8"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "md": "16px",
                        "xl": "32px",
                        "xs": "4px",
                        "sm": "8px",
                        "safe-area-inset": "max(16px, env(safe-area-inset-bottom))",
                        "lg": "24px",
                        "base": "4px"
                    },
                    fontFamily: {
                        "label-caps": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "title-md": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    fontSize: {
                        "label-caps": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "700" }],
                        "headline-lg-mobile": ["24px", { lineHeight: "32px", fontWeight: "700" }],
                        "display-lg": ["48px", { lineHeight: "52px", letterSpacing: "-0.02em", fontWeight: "800" }],
                        "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
                        "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "title-md": ["20px", { lineHeight: "28px", fontWeight: "600" }],
                        "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.01em", fontWeight: "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        /* Custom Toggle Switch Styles */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #00ddd6; /* primary-fixed-dim */
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #00ddd6; /* primary-fixed-dim */
        }
        
        /* Immersive Input Focus Glow */
        .immersive-input:focus {
            box-shadow: 0 0 12px rgba(0, 221, 214, 0.3);
            border-color: rgba(0, 221, 214, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-md relative overflow-hidden">
<!-- Ambient Background Glow (Simulating deep dark room aesthetic) -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-primary-fixed-dim/5 blur-[120px] rounded-full"></div>
<div class="absolute top-[60%] -right-[10%] w-[40%] h-[40%] bg-secondary-container/5 blur-[100px] rounded-full"></div>
</div>
<!-- Backdrop Blur Overlay -->
<div class="absolute inset-0 z-10 bg-black/40 backdrop-blur-xl"></div>
<!-- Configuration Modal (Level 1 Surface with Cyan Glow) -->
<div class="relative z-20 w-full max-w-lg bg-surface-container-lowest border border-primary-container/30 rounded-xl shadow-[0_0_25px_rgba(0,242,234,0.15)] flex flex-col overflow-hidden">
<!-- Header -->
<div class="flex items-center justify-between p-lg border-b border-white/5 bg-surface-container-low/50">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary-fixed-dim" style="font-variation-settings: 'FILL' 1;">router</span>
<h2 class="font-title-md text-title-md text-on-surface">IPTV Configuration</h2>
</div>
<button class="text-on-surface-variant hover:text-primary-fixed-dim transition-colors rounded-full p-xs hover:bg-white/5 active:scale-95">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Body -->
<div class="p-lg flex flex-col gap-lg overflow-y-auto max-h-[618px]">
<!-- Source URLs Section -->
<div class="flex flex-col gap-md">
<div class="flex flex-col gap-sm">
<label class="font-body-sm text-body-sm text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">link</span>
                        M3U Playlist URL
                    </label>
<input class="immersive-input w-full bg-[rgba(255,255,255,0.08)] hover:bg-[rgba(255,255,255,0.12)] focus:bg-[rgba(255,255,255,0.16)] text-on-surface font-body-lg text-body-lg px-md py-sm rounded-lg border border-transparent outline-none transition-all placeholder:text-on-surface-variant/50" placeholder="https://example.com/playlist.m3u" type="text"/>
</div>
<div class="flex flex-col gap-sm">
<label class="font-body-sm text-body-sm text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">list_alt</span>
                        EPG (Electronic Program Guide) URL
                    </label>
<input class="immersive-input w-full bg-[rgba(255,255,255,0.08)] hover:bg-[rgba(255,255,255,0.12)] focus:bg-[rgba(255,255,255,0.16)] text-on-surface font-body-lg text-body-lg px-md py-sm rounded-lg border border-transparent outline-none transition-all placeholder:text-on-surface-variant/50" placeholder="https://example.com/guide.xml" type="text"/>
</div>
</div>
<hr class="border-white/5"/>
<!-- Remote Subscription Section -->
<div class="flex flex-col gap-md">
<h3 class="font-label-caps text-label-caps text-primary-fixed-dim tracking-wider uppercase">Remote Subscription</h3>
<div class="flex flex-col gap-sm">
<label class="font-body-sm text-body-sm text-on-surface-variant">Sync Frequency</label>
<div class="relative">
<select class="immersive-input w-full bg-[rgba(255,255,255,0.08)] hover:bg-[rgba(255,255,255,0.12)] focus:bg-[rgba(255,255,255,0.16)] text-on-surface font-body-lg text-body-lg px-md py-sm rounded-lg border border-transparent outline-none transition-all appearance-none cursor-pointer">
<option class="bg-surface-container text-on-surface" value="startup">On Startup Only</option>
<option class="bg-surface-container text-on-surface" value="12h">Every 12 Hours</option>
<option class="bg-surface-container text-on-surface" selected="" value="24h">Every 24 Hours</option>
<option class="bg-surface-container text-on-surface" value="manual">Manual Sync</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<div class="flex items-center justify-between p-sm rounded-lg bg-[rgba(255,255,255,0.03)] border border-white/5 mt-xs">
<div class="flex flex-col">
<span class="font-body-lg text-body-lg text-on-surface">Auto-refresh playlist</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Update channels in background</span>
</div>
<!-- Custom Toggle -->
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer border-surface-variant transition-transform duration-200 ease-in-out z-10 top-0 translate-x-0 checked:translate-x-6 checked:border-primary-fixed-dim" id="toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-surface-variant cursor-pointer transition-colors duration-200 ease-in-out" for="toggle"></label>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="p-lg border-t border-white/5 bg-surface-container-low/30 flex items-center justify-between gap-md">
<button class="flex items-center gap-sm px-md py-sm rounded-lg bg-[rgba(255,255,255,0.05)] hover:bg-[rgba(255,255,255,0.1)] border border-white/10 hover:border-primary-container/40 text-on-surface font-title-md text-title-md transition-all group active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary-fixed-dim transition-colors text-[20px]">bolt</span>
                Test Connection
            </button>
<button class="flex items-center gap-sm px-lg py-sm rounded-lg bg-primary-fixed-dim text-on-primary-fixed-variant font-title-md text-title-md font-bold shadow-[0_0_15px_rgba(0,221,214,0.3)] hover:shadow-[0_0_25px_rgba(0,221,214,0.6)] hover:bg-primary transition-all active:scale-95">
                Save Sources
                <span class="material-symbols-outlined text-[20px]">check</span>
</button>
</div>
</div>
</body></html>
