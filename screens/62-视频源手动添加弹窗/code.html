<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>添加视频源</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#920029",

                        "surface": "#131313",

                        "on-primary-fixed": "#00201e",
                        "surface-container-lowest": "#0e0e0e",

                        "surface-tint": "#00ddd6",

                        "outline": "#849492",

                        "on-tertiary-fixed-variant": "#454747",
                        "inverse-on-surface": "#313030",
                        "primary": "#cffffb",
                        "on-tertiary-fixed": "#1a1c1c",
                        "on-tertiary-container": "#5d5f5f",
                        "secondary-container": "#ff516a",
                        "tertiary-container": "#d9d9d9",

                    },
                    "borderRadius": {

                    },
                    "spacing": {

                    },
                    "fontFamily": {

<style>
        body {
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 221, 214, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 81, 106, 0.05), transparent 25%);
        }
        
        /* Custom Input Styling */
        input:focus, select:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(0, 221, 214, 0.2);
            border-color: rgba(0, 221, 214, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex items-center justify-center p-md md:p-xl font-body-lg text-on-surface antialiased relative overflow-hidden">
<!-- Background Image with Overlay for context -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1616469829581-73993eb86b02?q=80&amp;w=2070&amp;auto=format&amp;fit=crop')] bg-cover bg-center opacity-20" data-alt="A dark cinematic shot of a high-tech glowing server room or futuristic digital control center, illuminated by stark neon cyan and magenta lights. The environment is heavily tech-focused, creating an immersive, cyberpunk-inspired atmosphere fitting for a digital streaming aggregator platform. Shadows are deep, enhancing the glowing technological elements."></div>
<div class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
</div>
<!-- Modal Container -->
<div class="relative z-10 w-full max-w-md bg-surface-container/80 backdrop-blur-2xl rounded-xl border border-white/5 shadow-[0_0_40px_rgba(0,0,0,0.8)] flex flex-col overflow-hidden">
<!-- Header -->
<div class="flex items-center justify-between px-lg py-md border-b border-white/5">
<h2 class="font-title-md text-title-md text-primary-fixed-dim drop-shadow-[0_0_8px_rgba(0,221,214,0.3)]">添加视频源</h2>
<button class="text-on-surface-variant hover:text-white transition-colors p-sm rounded-full hover:bg-white/5 active:scale-95">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Form Body -->
<div class="p-lg flex flex-col gap-lg">
<!-- 源名称 Input -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="sourceName">源名称</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant/50 text-[18px]">label</span>
</div>
<input class="w-full bg-white/5 border border-white/10 rounded-lg py-sm pr-sm pl-[36px] text-white placeholder-on-surface-variant/30 font-body-sm text-body-sm transition-all focus:bg-white/10" id="sourceName" placeholder="例如: 极速解析源1" type="text"/>
</div>
</div>
<!-- 播放地址 Input -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="playUrl">播放地址 (URL)</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant/50 text-[18px]">link</span>
</div>
<input class="w-full bg-white/5 border border-white/10 rounded-lg py-sm pr-sm pl-[36px] text-white placeholder-on-surface-variant/30 font-body-sm text-body-sm transition-all focus:bg-white/10" id="playUrl" placeholder="https://" type="url"/>
</div>
</div>
<!-- UA 标识 Input -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="userAgent">UA 标识 (User-Agent)</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant/50 text-[18px]">devices</span>
</div>
<input class="w-full bg-white/5 border border-white/10 rounded-lg py-sm pr-sm pl-[36px] text-white placeholder-on-surface-variant/30 font-body-sm text-body-sm transition-all focus:bg-white/10" id="userAgent" placeholder="默认 UA" type="text"/>
</div>
</div>
<!-- 解析引擎 Select -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="engineSelect">解析引擎</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none z-10">
<span class="material-symbols-outlined text-on-surface-variant/50 text-[18px]">memory</span>
</div>
<select class="w-full bg-white/5 border border-white/10 rounded-lg py-sm pr-lg pl-[36px] text-white font-body-sm text-body-sm appearance-none transition-all focus:bg-white/10 cursor-pointer" id="engineSelect">
<option class="bg-surface-container text-white" value="builtin">内置</option>
<option class="bg-surface-container text-white" value="native">原生</option>
</select>
<div class="absolute inset-y-0 right-0 pr-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant/50 text-[18px]">expand_more</span>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="flex items-center justify-end gap-md px-lg py-md border-t border-white/5 bg-white/5">
<button class="px-md py-sm rounded-lg font-body-sm text-body-sm text-on-surface-variant hover:text-white hover:bg-white/10 transition-all active:scale-95">
                取消
            </button>
<button class="px-md py-sm rounded-lg font-body-sm text-body-sm font-semibold text-black bg-primary-fixed-dim hover:bg-primary transition-all active:scale-95 shadow-[0_0_15px_rgba(0,221,214,0.4)] flex items-center gap-sm">
<span class="material-symbols-outlined text-[18px]">add</span>
                立即添加
            </button>
</div>
</div>
</body></html>
