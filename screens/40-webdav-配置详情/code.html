<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .neon-border-focus:focus-within {
            border-color: #00ddd6;
            box-shadow: 0 0 15px rgba(0, 221, 214, 0.3);
        }
        .pulse-pink {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        body {
            background-color: #050505;
            color: #e5e2e1;
            overflow-x: hidden;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-container": "#d9d9d9",
                    "inverse-surface": "#e5e2e1",
                    "on-primary-container": "#006a66",
                    "on-tertiary": "#2f3131",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "outline": "#849492",
                    "on-secondary-fixed-variant": "#920029",
                    "on-secondary-container": "#5b0016",
                    "on-primary-fixed": "#00201e",
                    "secondary-fixed": "#ffdadb",
                    "surface-container-highest": "#353534",
                    "surface-bright": "#3a3939",
                    "primary-container": "#00f2ea",
                    "outline-variant": "#3a4a48",
                    "on-secondary-fixed": "#40000d",
                    "on-tertiary-fixed-variant": "#454747",
                    "on-error": "#690005",
                    "inverse-on-surface": "#313030",
                    "tertiary-fixed": "#e2e2e2",
                    "secondary-container": "#ff516a",
                    "secondary": "#ffb2b6",
                    "surface-container-lowest": "#0e0e0e",
                    "error": "#ffb4ab",
                    "secondary-fixed-dim": "#ffb2b6",
                    "on-primary-fixed-variant": "#00504d",
                    "inverse-primary": "#006a66",
                    "primary-fixed-dim": "#00ddd6",
                    "on-surface-variant": "#b9cac8",
                    "primary-fixed": "#29fcf3",
                    "on-background": "#e5e2e1",
                    "error-container": "#93000a",
                    "background": "#131313",
                    "primary": "#cffffb",
                    "on-tertiary-container": "#5d5f5f",
                    "on-primary": "#003735",
                    "on-tertiary-fixed": "#1a1c1c",
                    "surface-dim": "#131313",
                    "surface-container": "#201f1f",
                    "surface": "#131313",
                    "surface-variant": "#353534",
                    "surface-container-low": "#1c1b1b",
                    "on-surface": "#e5e2e1",
                    "on-error-container": "#ffdad6",
                    "on-secondary": "#67001b",
                    "surface-container-high": "#2a2a2a",
                    "tertiary": "#f5f5f5",
                    "surface-tint": "#00ddd6"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "sm": "8px",
                    "safe-area-inset": "max(16px, env(safe-area-inset-bottom))",
                    "base": "4px",
                    "md": "16px",
                    "lg": "24px",
                    "xl": "32px",
                    "xs": "4px"
            },
            "fontFamily": {
                    "display-lg": ["Inter"],
                    "body-lg": ["Inter"],
                    "body-sm": ["Inter"],
                    "title-md": ["Inter"],
                    "label-caps": ["Inter"],
                    "headline-lg": ["Inter"],
                    "headline-lg-mobile": ["Inter"]
            },
            "fontSize": {
                    "display-lg": ["48px", {"lineHeight": "52px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "title-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-lg">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 backdrop-blur-md flex justify-between items-center px-md h-16 bg-background/80"><div class="flex items-center gap-md">
<button class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity">arrow_back</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile tracking-tighter text-primary shadow-[0_0_10px_rgba(0,221,214,0.3)]">WebDAV Config</h1>
</div>
<div class="flex gap-md">
<button class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity">settings</button>
</div></header>
<!-- Main Canvas -->
<main class="flex-grow pt-24 pb-32 px-md max-w-2xl mx-auto w-full">
<!-- Header Info -->
<section class="mb-xl"><p class="text-on-surface-variant font-body-sm">Securely sync your library across all your devices using high-speed cloud architecture.</p></section>
<!-- Configuration Form -->
<div class="space-y-lg">
<!-- Server URL -->
<div class="flex flex-col gap-base">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-xs">SERVER URL</label>
<div class="glass-panel flex items-center rounded-xl p-base neon-border-focus border-transparent transition-all duration-300">
<span class="material-symbols-outlined px-md text-on-surface-variant">dns</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface py-md placeholder:text-on-surface-variant/40" placeholder="https://dav.yourcloud.com/remote.php/webdav/" type="text">
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Username -->
<div class="flex flex-col gap-base">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-xs">USERNAME</label>
<div class="glass-panel flex items-center rounded-xl p-base neon-border-focus border-transparent transition-all duration-300">
<span class="material-symbols-outlined px-md text-on-surface-variant">person</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface py-md placeholder:text-on-surface-variant/40" placeholder="admin_user" type="text">
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-base">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-xs">APP PASSWORD</label>
<div class="glass-panel flex items-center rounded-xl p-base neon-border-focus border-transparent transition-all duration-300">
<span class="material-symbols-outlined px-md text-on-surface-variant">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface py-md placeholder:text-on-surface-variant/40" placeholder="••••••••••••" type="password">
</div>
</div>
</div>
<!-- Path -->
<div class="flex flex-col gap-base">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-xs">SYNC PATH</label>
<div class="glass-panel flex items-center rounded-xl p-base neon-border-focus border-transparent transition-all duration-300">
<span class="material-symbols-outlined px-md text-on-surface-variant">folder_open</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface py-md placeholder:text-on-surface-variant/40" placeholder="/media/library/sync" type="text">
</div>
</div>
<!-- Status Indicator -->
<div class="flex items-center gap-md p-md glass-panel rounded-xl">
<div class="relative">
<div class="w-3 h-3 bg-secondary-container rounded-full pulse-pink"></div>
<div class="absolute inset-0 w-3 h-3 bg-secondary-container rounded-full blur-[4px]"></div>
</div>
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-secondary-container">LIVE STATUS</span>
<span class="text-on-surface-variant text-body-sm">Awaiting authentication parameters...</span>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row gap-md pt-lg">
<button class="flex-1 glass-panel py-lg rounded-xl border-outline-variant hover:bg-surface-variant transition-colors flex items-center justify-center gap-sm" onclick="testConnection(this)">
<span class="material-symbols-outlined text-on-surface">network_check</span>
<span class="font-title-md text-title-md">Test Connection</span>
</button>
<button class="flex-1 bg-primary-container text-on-primary-container py-lg rounded-xl font-title-md text-title-md hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-sm shadow-[0_0_20px_rgba(0,221,214,0.4)]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">sync</span>
                    Sync Now
                </button>
</div>
</div>
<!-- Connection Logs / Hint -->
<section class="mt-xl p-md border-t border-white/5">
<h3 class="font-label-caps text-label-caps text-on-surface-variant mb-md uppercase">Connection Settings</h3>
<div class="grid grid-cols-2 gap-sm">
<div class="glass-panel p-md rounded-lg flex flex-col gap-xs">
<span class="text-body-sm text-on-surface-variant">SSL/TLS</span>
<span class="text-primary font-bold">REQUIRED</span>
</div>
<div class="glass-panel p-md rounded-lg flex flex-col gap-xs">
<span class="text-body-sm text-on-surface-variant">TIMEOUT</span>
<span class="text-primary font-bold">30s</span>
</div>
</div>
</section>
</main>
<!-- Visual Backdrop (Ambient Light) -->
<div class="fixed top-0 right-0 -z-10 w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px] translate-x-1/2 -translate-y-1/2"></div>
<div class="fixed bottom-0 left-0 -z-10 w-[300px] h-[300px] bg-secondary-container/10 rounded-full blur-[100px] -translate-x-1/2 translate-y-1/2"></div>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-background/80 backdrop-blur-xl flex justify-around items-center px-md pb-safe-area-inset h-20">
<div class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:text-primary transition-all">
<span class="material-symbols-outlined">movie</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:text-primary transition-all">
<span class="material-symbols-outlined">live_tv</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:text-primary transition-all">
<span class="material-symbols-outlined">music_note</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:text-primary transition-all">
<span class="material-symbols-outlined">auto_stories</span>
</div>
<div class="flex flex-col items-center justify-center text-primary scale-110 shadow-[0_0_15px_rgba(0,221,214,0.5)]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
</nav>
<script>
        function testConnection(btn) {
            const originalContent = btn.innerHTML;
            btn.innerHTML = `
                <div class="animate-spin h-5 w-5 border-2 border-primary border-t-transparent rounded-full"></div>
                <span class="font-title-md text-title-md">Testing...</span>
            `;
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = `
                    <span class="material-symbols-outlined text-primary-fixed-dim">check_circle</span>
                    <span class="font-title-md text-title-md text-primary-fixed-dim">Connected</span>
                `;
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                }, 2000);
            }, 1500);
        }
    </script>


</body></html>
