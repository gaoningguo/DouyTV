<!DOCTYPE html>

<html class="dark" lang="zh"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Immersive Manga Reader - Cyberpunk</title>

                    "surface-container-high": "#2a2a2a",

                    "on-surface": "#e5e2e1",

                    "tertiary": "#f5f5f5",

<style>
        /* Custom scrollbar for an immersive feel */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 221, 214, 0.3); /* primary-fixed-dim */
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(41, 252, 243, 0.8); /* primary-fixed */
        }
        
        /* Utility for hiding scrollbar while keeping functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Interaction glows */
        .neon-glow {
            box-shadow: 0 0 12px rgba(41, 252, 243, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background h-screen w-screen overflow-hidden overscroll-none select-none font-body-sm">
<!-- Top Action Bar (Minimal, hidden by default, toggled with reader controls) -->
<header class="fixed top-0 left-0 w-full z-40 bg-surface/80 backdrop-blur-xl h-16 flex justify-between items-center px-md transition-transform duration-300 transform -translate-y-full" id="top-bar">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-bright transition-colors text-on-surface">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<h1 class="font-title-md text-title-md text-on-surface truncate max-w-[200px]">赛博纪元：深潜</h1>
<span class="font-label-caps text-label-caps text-on-surface-variant">第十二章</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-bright transition-colors text-on-surface">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">more_vert</span>
</button>
</header>
<!-- Main Manga Canvas -->
<main class="h-full w-full overflow-y-auto no-scrollbar relative cursor-pointer" id="manga-container">
<!-- Panel 1 -->
<div class="w-full relative bg-surface-dim min-h-[442px]">
<img class="w-full object-cover block" data-alt="A highly detailed comic panel illustrating a sprawling cyberpunk cityscape at night. Towering skyscrapers dominate the frame, glowing with intense cyan and hot pink neon signs. Flying vehicles leave trails of light through the heavy, rain-slicked atmosphere. The art style is dark, immersive, and highly contrasted, fitting a modern digital manga aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBi0c0cOHF4grSgOLjOOm_A7gIx95sT8EeJ5_w6vf4VYHo3LK3Owp7hTrTrXiZCMjLS0VDn9y-kxFiqY8vc-EFgGOX_mqIZ2_3ma0j8ml-EKBuztNp5jMo0fN1hRbVWpVoXd7coynsDWlMn3kcoxSTKwZJIsLVXfAP8MkLD1ixmEYTNUcamld4paWfgtI2qcfBijFqL9cMQ6bPJDhKHW8t3wM1JspDc0ZALRf7U3CtbM2h8eV1l40ucvWrHaE2oh6Cyx2tnfjc7tJQ"/>
</div>
<!-- Panel 2 -->
<div class="w-full relative bg-surface-dim min-h-[530px]">
<img class="w-full object-cover block" data-alt="A close-up manga panel of a cybernetic character looking over the edge of a high-rise building. The character is silhouetted against a chaotic, brightly lit urban canyon below. The lighting is dramatic, emphasizing deep blacks and vibrant neon blue highlights reflecting off metallic implants. The mood is tense and contemplative, rendered in a high-energy digital art style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBK8edZ0q1DQoQ7e9WoFpwMxF-icApXm9S2QTP_6DFuIHG64nmMoXkx1DCba5AcJH3wjm790xxyTYSiteLFbiS7_ACzgDWwVvrDh0Yuq69NruFDqGKuOPVMmwtzzahqt6x1WG49QLcHboxFBPq0lJUDYsDAwT7jeHGEn_K0fx_6-ScqIAsG-mUsZFB8IJA59ek8zcW2LB-Mgo-FcVgPxp2PbL8cyU0cIoqPHbrr_AtCUSxzNsV0tHhFRcAZQEaqPla55HvDf-mfL08"/>
</div>
<!-- Panel 3 -->
<div class="w-full relative bg-surface-dim min-h-[353px]">
<img class="w-full object-cover block" data-alt="An action-packed manga panel showing an underground neon-lit alleyway. Rain pours down heavily, creating a glass-like reflection on the pavement. The scene is illuminated entirely by a malfunctioning, flickering cyan holographic advertisement. The atmosphere feels gritty, dangerous, and immersive, perfectly matching a dark-room digital reading experience." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBTW3X1C9fhAetxGTmM8UexhGwcvx-XToNsthKQwh1JOVfiE5T0fbwoOfRoPwjaqIu8Dhcr5cvzcxv6K01asAEcY2BCeVjUV_6tCtRvPl5PZ2gtby_WJnA0aalwVoO2a3iZQ05dgiy5XsGWAlhInyWJCWOg2CGi6FWkIzYjM7Wv8n4uiuamqwvZ489c80Zf1l6t8BkigYnFmE9qhPPij_Tv24EBXEAE2BLL8GG8K7AW9OP0tlgLh8Wq-fbG2ZCV7NA9fCQ_UTSOO_w"/>
</div>
<!-- Bottom padding to ensure content clears the fixed bottom nav -->
<div class="h-32 w-full"></div>
</main>
<!-- Immersive Bottom Progress & Controls Overlay -->
<div class="fixed bottom-0 left-0 w-full z-40 transition-transform duration-300 transform translate-y-0 px-md pb-safe-area-inset pt-sm pointer-events-none" id="bottom-controls">
<div class="flex items-end justify-between w-full h-full pointer-events-auto">
<!-- Progress Pill -->
<div class="bg-surface/90 backdrop-blur-2xl rounded-full px-4 py-2 flex items-center gap-2 border border-outline-variant/30 shadow-lg mb-md">
<span class="font-label-caps text-label-caps text-primary-fixed-dim">第 12 页</span>
<div class="w-[1px] h-3 bg-outline-variant"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant">共 450 页</span>
</div>
<!-- Floating Settings Action Button -->
<button class="w-14 h-14 rounded-full bg-surface-container/90 backdrop-blur-xl border border-primary/20 flex items-center justify-center text-primary-fixed transition-all active:scale-95 neon-glow mb-md" id="btn-settings">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">tune</span>
</button>
</div>
<!-- Ultra-thin Progress Bar (Edge-to-Edge) -->
<div class="absolute bottom-0 left-0 w-full h-[2px] bg-surface-container-high pointer-events-auto cursor-pointer group hover:h-[6px] transition-all">
<div class="h-full bg-primary-fixed shadow-[0_0_8px_rgba(41,252,243,0.8)] relative" style="width: 2.6%;">
<div class="absolute right-0 top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
</div>
</div>
<!-- Glassmorphic Settings Menu (Slide up Sheet) -->
<div class="fixed bottom-0 left-0 w-full z-50 bg-surface/95 backdrop-blur-3xl rounded-t-xl border-t border-outline-variant/20 transition-transform duration-300 transform translate-y-full flex flex-col pb-safe-area-inset" id="settings-sheet">
<!-- Drag Handle Area -->
<div class="w-full flex justify-center py-sm cursor-pointer" id="settings-close">
<div class="w-12 h-1 bg-outline-variant rounded-full"></div>
</div>
<div class="p-md flex flex-col gap-xl">
<!-- Header -->
<div class="flex justify-between items-center">
<h2 class="font-title-md text-title-md text-on-surface">阅读设置</h2>
<button class="text-on-surface-variant hover:text-on-surface transition-colors" id="btn-close-settings">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Brightness Slider -->
<div class="flex flex-col gap-sm">
<div class="flex justify-between items-center">
<span class="font-body-sm text-body-sm text-on-surface-variant">屏幕亮度</span>
<span class="material-symbols-outlined text-on-surface-variant text-[18px]">light_mode</span>
</div>
<input class="w-full h-1 bg-surface-container-high rounded-full appearance-none cursor-pointer accent-primary-fixed focus:outline-none" max="100" min="0" type="range" value="70"/>
</div>
<!-- Reading Mode Toggles -->
<div class="flex flex-col gap-sm">
<span class="font-body-sm text-body-sm text-on-surface-variant">阅读模式</span>
<div class="grid grid-cols-2 gap-sm">
<button class="flex items-center justify-center gap-2 py-3 rounded-lg bg-primary-container text-on-primary-container border border-primary/30">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">dark_mode</span>
<span class="font-label-caps text-label-caps">深渊模式</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 rounded-lg bg-surface-container border border-outline-variant hover:bg-surface-bright transition-colors text-on-surface">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">contrast</span>
<span class="font-label-caps text-label-caps">高对比度</span>
</button>
</div>
</div>
<!-- Chapter Selection -->
<div class="flex flex-col gap-sm mt-sm">
<div class="flex justify-between items-center mb-xs">
<span class="font-body-sm text-body-sm text-on-surface-variant">章节目录</span>
<span class="font-label-caps text-label-caps text-primary-fixed">共 86 章</span>
</div>
<div class="flex flex-col gap-[2px]">
<button class="w-full flex items-center justify-between p-sm rounded-md hover:bg-surface-container transition-colors text-on-surface">
<span class="font-body-sm text-body-sm truncate">第十一章：霓虹之下</span>
<span class="material-symbols-outlined text-[16px] text-on-surface-variant">lock_open</span>
</button>
<button class="w-full flex items-center justify-between p-sm rounded-md bg-surface-container text-primary-fixed border-l-2 border-primary-fixed">
<span class="font-title-md text-title-md !text-[14px] truncate">第十二章：数据幽灵</span>
<span class="font-label-caps text-label-caps">当前阅读</span>
</button>
<button class="w-full flex items-center justify-between p-sm rounded-md hover:bg-surface-container transition-colors text-on-surface opacity-50">
<span class="font-body-sm text-body-sm truncate">第十三章：义体反叛</span>
<span class="material-symbols-outlined text-[16px]">lock</span>
</button>
</div>
</div>
</div>
</div>
<!-- Background overlay for when settings are open -->
<div class="fixed inset-0 bg-background/60 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300" id="scrim"></div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('manga-container');
            const topBar = document.getElementById('top-bar');
            const bottomControls = document.getElementById('bottom-controls');
            
            const btnSettings = document.getElementById('btn-settings');
            const settingsSheet = document.getElementById('settings-sheet');
            const btnCloseSettings = document.getElementById('btn-close-settings');
            const settingsCloseHandle = document.getElementById('settings-close');
            const scrim = document.getElementById('scrim');

            let isUIHidden = false;
            let lastScrollTop = 0;
            let isSettingsOpen = false;

            // Toggle HUD on canvas tap
            container.addEventListener('click', () => {
                if(isSettingsOpen) return;
                isUIHidden = !isUIHidden;
                if (isUIHidden) {
                    topBar.classList.add('-translate-y-full');
                    bottomControls.classList.add('translate-y-full');
                } else {
                    topBar.classList.remove('-translate-y-full');
                    bottomControls.classList.remove('translate-y-full');
                }
            });

            // Open Settings
            const openSettings = (e) => {
                e.stopPropagation(); // Prevent canvas click
                isSettingsOpen = true;
                settingsSheet.classList.remove('translate-y-full');
                scrim.classList.remove('hidden');
                // Small delay to allow display:block to apply before animating opacity
                setTimeout(() => scrim.classList.remove('opacity-0'), 10);
            };

            // Close Settings
            const closeSettings = () => {
                isSettingsOpen = false;
                settingsSheet.classList.add('translate-y-full');
                scrim.classList.add('opacity-0');
                setTimeout(() => scrim.classList.add('hidden'), 300);
            };

            btnSettings.addEventListener('click', openSettings);
            btnCloseSettings.addEventListener('click', closeSettings);
            settingsCloseHandle.addEventListener('click', closeSettings);
            scrim.addEventListener('click', closeSettings);

            // Basic scroll logic to hide HUD when scrolling down (optional immersive enhancement)
            container.addEventListener('scroll', () => {
                if(isSettingsOpen) return;
                let st = container.scrollTop;
                if (st > lastScrollTop && st > 100) {
                    // Scrolling down
                    if (!isUIHidden) {
                        isUIHidden = true;
                        topBar.classList.add('-translate-y-full');
                        bottomControls.classList.add('translate-y-full');
                    }
                }
                lastScrollTop = st <= 0 ? 0 : st;
            }, false);
        });
    </script>
</body></html>
