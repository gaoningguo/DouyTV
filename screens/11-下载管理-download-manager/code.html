<!-- Background ambient glow -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
<div class="absolute top-[20%] left-[10%] w-[40vw] h-[40vw] bg-primary-container/5 rounded-full blur-[100px]"></div>

</div>
<style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.3s ease-out forwards;
        }
        @keyframes translateX {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
    </style>
<script>
        function switchTab(tabName) {
            const dlBtn = document.getElementById('tab-downloading');
            const compBtn = document.getElementById('tab-completed');
            const dlSec = document.getElementById('section-downloading');
            const compSec = document.getElementById('section-completed');

            // Active classes for tab buttons
            const activeClasses = ['bg-surface-container-high', 'text-primary-container', 'drop-shadow-[0_0_8px_rgba(0,242,234,0.3)]'];
            const inactiveClasses = ['text-on-surface-variant', 'hover:text-on-surface'];

            if (tabName === 'downloading') {
                dlSec.classList.remove('hidden');
                dlSec.classList.add('flex');
                compSec.classList.add('hidden');
                compSec.classList.remove('flex');

                dlBtn.classList.add(...activeClasses);
                dlBtn.classList.remove(...inactiveClasses);
                compBtn.classList.remove(...activeClasses);
                compBtn.classList.add(...inactiveClasses);
            } else {
                compSec.classList.remove('hidden');
                compSec.classList.add('flex');
                dlSec.classList.add('hidden');
                dlSec.classList.remove('flex');

                compBtn.classList.add(...activeClasses);
                compBtn.classList.remove(...inactiveClasses);
                dlBtn.classList.remove(...activeClasses);
                dlBtn.classList.add(...inactiveClasses);
            }
        }
    </script>
