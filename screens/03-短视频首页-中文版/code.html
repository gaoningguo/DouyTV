<script>
        // Simple micro-interaction for liking
        document.querySelectorAll('.material-symbols-outlined[data-icon="favorite"]').forEach(heart => {
            heart.parentElement.addEventListener('click', function() {
                const isFilled = heart.style.fontVariationSettings.includes("'FILL' 1");
                if (isFilled) {
                    heart.style.fontVariationSettings = "'FILL' 0";
                    heart.classList.remove('text-secondary', 'neon-glow-pink');
                    heart.classList.add('text-on-surface');
                } else {
                    heart.style.fontVariationSettings = "'FILL' 1";
                    heart.classList.remove('text-on-surface');
                    heart.classList.add('text-secondary', 'neon-glow-pink');
                    
                    // Create a small burst effect
                    const burst = document.createElement('div');
                    burst.className = 'absolute w-12 h-12 bg-secondary/30 rounded-full animate-ping';
                    this.appendChild(burst);
                    setTimeout(() => burst.remove(), 500);
                }
            });
        });

        // Prevent default scrolling on body to keep vertical feed clean
        document.addEventListener('touchmove', function(e) {
            // Check if we are inside the feed
            if (!e.target.closest('.vertical-feed')) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
