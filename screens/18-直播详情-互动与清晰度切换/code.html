<script>
        // Simple chat stream animation
        const chatContainer = document.getElementById('chat-stream');
        const comments = [
            { user: "极客阿强", text: "有人知道背景音乐叫什么吗？" },
            { user: "Pinky", text: "这个混音太炸了！" },
            { user: "元宇宙村民", text: "疯狂刷屏中..." },
            { user: "赛博甜心_Official", text: "大家注意安全，不要拥挤哦 ❤️" }
        ];

        let index = 0;
        setInterval(() => {
            const comment = comments[index];
            const div = document.createElement('div');
            div.className = "glass-container px-md py-sm rounded-lg flex gap-sm items-start opacity-0 translate-y-4 transition-all duration-500";
            div.innerHTML = `
                <span class="text-primary-fixed-dim font-label-caps text-label-caps whitespace-nowrap">${comment.user}:</span>
                <span class="text-on-surface text-body-sm">${comment.text}</span>
            `;
            chatContainer.appendChild(div);
            
            // Trigger animation
            setTimeout(() => {
                div.classList.remove('opacity-0', 'translate-y-4');
            }, 50);

            // Keep only latest 4
            if (chatContainer.children.length > 5) {
                chatContainer.removeChild(chatContainer.firstChild);
            }

            index = (index + 1) % comments.length;
        }, 3000);
    </script>
