<script>
    // Interaction logic for immersive feed
    const mainArea = document.querySelector('main');
    mainArea.addEventListener('click', (e) => {
        // Prevent click if hitting right side buttons
        if(e.target.closest('.absolute.right-md')) return;
        
        // Visual feedback for transition
        mainArea.style.opacity = '0.5';
        mainArea.style.transform = 'scale(0.98)';
        setTimeout(() => {
            console.log("Navigating to Live Details - Interactive Mode");
            // Placeholder for navigation
            alert("即将进入交互详情模式 (SCREEN_25)");
            mainArea.style.opacity = '1';
            mainArea.style.transform = 'scale(1)';
        }, 200);
    });

    // Handle like animation
    const likeBtn = document.querySelector('[data-icon="favorite"]').parentElement;
    likeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const icon = likeBtn.querySelector('span');
        icon.classList.toggle('text-secondary-container');
        icon.style.fontVariationSettings = icon.style.fontVariationSettings.includes("'FILL' 1") ? "'FILL' 0" : "'FILL' 1";
    });
</script>
