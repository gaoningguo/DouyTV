<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Suwayomi Server Configuration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#920029",
                        "on-secondary": "#67001b",
                        "error": "#ffb4ab",
                        "surface-dim": "#131313",
                        "secondary-fixed": "#ffdadb",
                        "inverse-surface": "#e5e2e1",
                        "secondary": "#ffb2b6",
                        "primary-container": "#00f2ea",
                        "on-primary-fixed-variant": "#00504d",
                        "surface-bright": "#3a3939",
                        "on-surface-variant": "#b9cac8",
                        "surface-container": "#201f1f",
                        "on-error-container": "#ffdad6",
                        "surface-container-high": "#2a2a2a",
                        "on-tertiary": "#2f3131",
                        "on-background": "#e5e2e1",
                        "background": "#131313",
                        "on-error": "#690005",
                        "on-primary-container": "#006a66",
                        "surface": "#131313",
                        "on-secondary-fixed": "#40000d",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "error-container": "#93000a",
                        "primary-fixed-dim": "#00ddd6",
                        "surface-container-highest": "#353534",
                        "on-primary-fixed": "#00201e",
                        "surface-container-lowest": "#0e0e0e",
                        "tertiary": "#f5f5f5",
                        "on-surface": "#e5e2e1",
                        "surface-tint": "#00ddd6",
                        "inverse-primary": "#006a66",
                        "on-secondary-container": "#5b0016",
                        "outline": "#849492",
                        "outline-variant": "#3a4a48",
                        "on-tertiary-fixed-variant": "#454747",
                        "inverse-on-surface": "#313030",
                        "primary": "#cffffb",
                        "on-tertiary-fixed": "#1a1c1c",
                        "on-tertiary-container": "#5d5f5f",
                        "secondary-container": "#ff516a",
                        "tertiary-container": "#d9d9d9",
                        "on-primary": "#003735",
                        "surface-variant": "#353534",
                        "secondary-fixed-dim": "#ffb2b6",
                        "tertiary-fixed": "#e2e2e2",
                        "primary-fixed": "#29fcf3",
                        "surface-container-low": "#1c1b1b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "safe-area-inset": "max(16px, env(safe-area-inset-bottom))",
                        "lg": "24px",
                        "base": "4px",
                        "md": "16px",
                        "xs": "4px",
                        "xl": "32px",
                        "sm": "8px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "title-md": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "display-lg": ["48px", { "lineHeight": "52px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "title-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #353534;
            border-radius: 9999px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-md overflow-hidden relative">
<!-- Ambient Background Blur (Decorative) -->
<div class="absolute inset-0 z-0 pointer-events-none">
<div class="absolute top-[20%] left-[30%] w-96 h-96 bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[20%] right-[20%] w-[30rem] h-[30rem] bg-secondary-container/5 rounded-full blur-[100px]"></div>
</div>
<!-- Immersive Dialog Container -->
<div class="relative z-10 w-full max-w-md bg-surface-container/60 backdrop-blur-xl border border-white/10 rounded-xl overflow-hidden shadow-2xl flex flex-col">
<!-- Header -->
<div class="px-lg py-md border-b border-white/5 flex justify-between items-center bg-gradient-to-b from-white/5 to-transparent">
<h2 class="font-title-md text-title-md text-on-surface">Suwayomi Server</h2>
<button class="text-on-surface-variant hover:text-primary transition-colors p-sm rounded-full bg-white/5 hover:bg-white/10 active:scale-95">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Content -->
<div class="p-lg flex flex-col gap-lg overflow-y-auto max-h-[618px]">
<!-- Inputs Group -->
<div class="flex flex-col gap-md">
<!-- Server Address -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">服务器地址</label>
<div class="relative group">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">link</span>
<input class="w-full bg-white/5 border border-white/10 rounded-lg py-sm pl-[44px] pr-md font-body-lg text-body-lg text-on-surface placeholder-on-surface-variant/50 focus:bg-white/10 focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all outline-none" placeholder="https://..." type="text" value="https://suwayomi.local"/>
</div>
</div>
<!-- Port -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">端口号</label>
<div class="relative group">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">settings</span>
<input class="w-full bg-white/5 border border-white/10 rounded-lg py-sm pl-[44px] pr-md font-body-lg text-body-lg text-on-surface placeholder-on-surface-variant/50 focus:bg-white/10 focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all outline-none" placeholder="4567" type="number" value="4567"/>
</div>
</div>
<!-- Access Token -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">访问令牌 (Access Token)</label>
<div class="relative group">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">key</span>
<input class="w-full bg-white/5 border border-white/10 rounded-lg py-sm pl-[44px] pr-md font-body-lg text-body-lg text-on-surface placeholder-on-surface-variant/50 focus:bg-white/10 focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all outline-none" placeholder="••••••••••••" type="password"/>
</div>
</div>
</div>
<!-- Toggles Group -->
<div class="flex flex-col gap-sm p-md bg-white/5 rounded-lg border border-white/5">
<!-- Sync Progress Toggle -->
<label class="flex items-center justify-between cursor-pointer group py-sm">
<span class="font-body-lg text-body-lg text-on-surface group-hover:text-primary transition-colors">同步阅读进度</span>
<div class="relative">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-10 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-on-surface-variant peer-checked:after:bg-primary-fixed-dim after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-fixed-dim/20 border border-white/10 peer-checked:border-primary/30"></div>
</div>
</label>
<!-- Auto Download Toggle -->
<label class="flex items-center justify-between cursor-pointer group py-sm">
<span class="font-body-lg text-body-lg text-on-surface group-hover:text-primary transition-colors">自动下载新章节</span>
<div class="relative">
<input class="sr-only peer" type="checkbox"/>
<div class="w-10 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-on-surface-variant peer-checked:after:bg-primary-fixed-dim after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-fixed-dim/20 border border-white/10 peer-checked:border-primary/30"></div>
</div>
</label>
</div>
</div>
<!-- Footer Actions -->
<div class="px-lg py-md border-t border-white/5 flex gap-md justify-end bg-surface-container-low/50">
<button class="px-md py-sm rounded-lg border border-outline-variant font-label-caps text-label-caps text-on-surface-variant hover:text-on-surface hover:border-outline hover:bg-white/5 transition-all active:scale-95">
                测试连接
            </button>
<button class="px-md py-sm rounded-lg bg-primary/10 border border-primary/30 font-label-caps text-label-caps text-primary-fixed-dim drop-shadow-[0_0_8px_rgba(0,221,214,0.4)] hover:drop-shadow-[0_0_12px_rgba(0,221,214,0.6)] hover:bg-primary/20 hover:border-primary/50 transition-all active:scale-95 flex items-center gap-sm">
<span>保存配置</span>
<span class="material-symbols-outlined text-[16px]">save</span>
</button>
</div>
</div>
</body></html>
