<style>
        /* Custom range slider styling for HUD feel */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #00f2ea;
            cursor: pointer;
            margin-top: -5px;
            box-shadow: 0 0 8px rgba(0, 242, 234, 0.8);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 1px;
        }
        input[type=range]:focus {
            outline: none;
        }
        /* Custom progress fill for sliders */
        .slider-progress {
            position: absolute;
            height: 2px;
            background: #00f2ea;
            border-radius: 1px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            box-shadow: 0 0 5px rgba(0, 242, 234, 0.5);
        }
        
        /* HUD Animations */
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(0, 242, 234, 0.4)); }
            50% { filter: drop-shadow(0 0 15px rgba(0, 242, 234, 0.8)); }
        }
        .hud-element {
            transition: all 0.3s ease;
        }
        .hud-element:hover {
            transform: scale(1.05);
            color: theme('colors.primary-container');
        }
    </style>

<!-- Idle Timeout Script -->
<script>
        // Simple script to update slider progress visuals and handle idle hiding
        document.querySelectorAll('input[type=range]').forEach(slider => {
            slider.addEventListener('input', function() {
                const percentage = (this.value - this.min) / (this.max - this.min) * 100;
                const progressDiv = this.nextElementSibling;
                if(progressDiv && progressDiv.classList.contains('slider-progress')) {
                    progressDiv.style.width = percentage + '%';
                }
            });
        });

        // Hide UI on idle
        let idleTimer;
        const uiContainer = document.getElementById('playback-ui');
        
        function resetIdleTimer() {
            uiContainer.style.opacity = '1';
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                uiContainer.style.opacity = '0';
            }, 3000); // Hide after 3 seconds of inactivity
        }

        // Attach events to reset timer
        ['mousemove', 'mousedown', 'touchstart', 'click', 'keydown'].forEach(evt => 
            document.addEventListener(evt, resetIdleTimer, false)
        );

        // Init timer
        resetIdleTimer();
    </script>
