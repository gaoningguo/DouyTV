<!DOCTYPE html>

<style>
        .neon-glow {
            box-shadow: 0 0 12px rgba(0, 242, 234, 0.2);
        }
        .neon-glow-active {
            box-shadow: 0 0 16px rgba(0, 242, 234, 0.4);
        }
        .neon-text-glow {
            text-shadow: 0 0 8px rgba(0, 242, 234, 0.6);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-surface min-h-screen pb-[100px] selection:bg-primary-container selection:text-on-primary">
<!-- TopAppBar -->
<header class="bg-surface/80 dark:bg-surface/80 backdrop-blur-xl sticky top-0 w-full z-50 bg-transparent flex justify-between items-center px-md py-sm w-full">
<button class="text-on-surface-variant hover:text-primary-fixed-dim transition-colors active:scale-95 duration-200 p-sm rounded-full bg-surface-container-low/50">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary-fixed-dim">Settings</h1>
<button class="text-on-surface-variant hover:text-primary-fixed-dim transition-colors active:scale-95 duration-200 p-sm rounded-full bg-surface-container-low/50">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<main class="px-md py-lg flex flex-col gap-xl max-w-2xl mx-auto">
<!-- Contextual Header -->
<section class="flex flex-col gap-xs">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Book Sources</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Manage and import your e-book repositories and catalogs.</p>
</section>
<!-- Import Options (Bento Grid) -->
<section class="grid grid-cols-2 gap-sm">
<button class="bg-surface-container-low/60 backdrop-blur-md border border-outline-variant/30 rounded-xl p-md flex flex-col items-center justify-center gap-sm hover:border-primary-container hover:bg-surface-container-high/80 neon-glow transition-all active:scale-95">
<span class="material-symbols-outlined text-primary-container text-3xl" style="font-variation-settings: 'FILL' 1;">cloud_download</span>
<span class="font-title-md text-title-md text-on-surface text-center leading-tight">OPDS<br/>Import</span>
</button>
<button class="bg-surface-container-low/60 backdrop-blur-md border border-primary-container/50 rounded-xl p-md flex flex-col items-center justify-center gap-sm hover:border-primary-container neon-glow-active transition-all active:scale-95 relative overflow-hidden">
<div class="absolute top-0 right-0 bg-primary-container text-on-primary font-label-caps text-[10px] px-2 py-1 rounded-bl-lg">PRO</div>
<span class="material-symbols-outlined text-primary-container text-3xl" style="font-variation-settings: 'FILL' 1;">library_books</span>
<span class="font-title-md text-title-md text-primary-container neon-text-glow text-center leading-tight">Legado<br/>Import</span>
</button>
<button class="bg-surface-container-low/60 backdrop-blur-md border border-outline-variant/30 rounded-xl p-md flex flex-col items-center justify-center gap-sm hover:border-primary-container hover:bg-surface-container-high/80 neon-glow transition-all active:scale-95">
<span class="material-symbols-outlined text-tertiary-fixed-dim text-3xl">add_link</span>
<span class="font-title-md text-title-md text-on-surface text-center leading-tight">Single<br/>Add</span>
</button>
<button class="bg-surface-container-low/60 backdrop-blur-md border border-outline-variant/30 rounded-xl p-md flex flex-col items-center justify-center gap-sm hover:border-primary-container hover:bg-surface-container-high/80 neon-glow transition-all active:scale-95">
<span class="material-symbols-outlined text-tertiary-fixed-dim text-3xl">edit_document</span>
<span class="font-title-md text-title-md text-on-surface text-center leading-tight">Manual<br/>Input</span>
</button>
</section>
<!-- Active Sources List -->
<section class="flex flex-col gap-sm">
<h3 class="font-label-caps text-label-caps text-on-surface-variant tracking-widest uppercase mb-xs px-xs">Active Catalogs</h3>
<!-- Source Item 1 -->
<div class="bg-surface-container-low rounded-lg p-md flex items-center justify-between border border-transparent hover:border-primary-container/30 transition-colors group">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center group-hover:bg-primary-container/10 transition-colors">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">menu_book</span>
</div>
<div class="flex flex-col">
<span class="font-title-md text-title-md text-on-surface">Legado Main Library</span>
<div class="flex items-center gap-sm mt-xs">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary-container opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary-container drop-shadow-[0_0_4px_rgba(0,242,234,1)]"></span>
</span>
<span class="font-label-caps text-label-caps text-on-surface-variant">ONLINE</span>
</div>
</div>
</div>
<button class="text-on-surface-variant hover:text-primary-container active:scale-90 transition-all p-sm rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<!-- Source Item 2 -->
<div class="bg-surface-container-low rounded-lg p-md flex items-center justify-between border border-transparent hover:border-primary-container/30 transition-colors group">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center group-hover:bg-primary-container/10 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">language</span>
</div>
<div class="flex flex-col">
<span class="font-title-md text-title-md text-on-surface">Standard OPDS</span>
<div class="flex items-center gap-sm mt-xs">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary-container opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary-container drop-shadow-[0_0_4px_rgba(0,242,234,1)]"></span>
</span>
<span class="font-label-caps text-label-caps text-on-surface-variant">ONLINE</span>
</div>
</div>
</div>
<button class="text-on-surface-variant hover:text-primary-container active:scale-90 transition-all p-sm rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<!-- Source Item 3 (Offline) -->
<div class="bg-surface-container-lowest opacity-70 rounded-lg p-md flex items-center justify-between border border-transparent">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-lg bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-outline">link_off</span>
</div>
<div class="flex flex-col">
<span class="font-title-md text-title-md text-outline">Archived Scans DB</span>
<div class="flex items-center gap-sm mt-xs">
<span class="relative flex h-2 w-2">
<span class="relative inline-flex rounded-full h-2 w-2 bg-outline"></span>
</span>
<span class="font-label-caps text-label-caps text-outline">OFFLINE</span>
</div>
</div>
</div>
<button class="text-outline hover:text-primary-container active:scale-90 transition-all p-sm rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-md pb-safe-area-inset pt-sm bg-surface/80 dark:bg-surface/80 backdrop-blur-xl z-50 bg-transparent md:hidden">
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 duration-300 gap-xs">
<span class="material-symbols-outlined">home</span>
<span class="font-label-caps text-label-caps">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 duration-300 gap-xs">
<span class="material-symbols-outlined">menu_book</span>
<span class="font-label-caps text-label-caps">Manga</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 duration-300 gap-xs">
<span class="material-symbols-outlined">sensors</span>
<span class="font-label-caps text-label-caps">Live</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 duration-300 gap-xs">
<span class="material-symbols-outlined">music_note</span>
<span class="font-label-caps text-label-caps">Music</span>
</button>
<!-- Active Tab: Profile (Maps to Settings Context) -->
<button class="flex flex-col items-center justify-center text-primary-container drop-shadow-[0_0_8px_rgba(0,242,234,0.5)] active:scale-90 transition-all duration-300 gap-xs">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-caps text-label-caps">Profile</span>
</button>
</nav>
