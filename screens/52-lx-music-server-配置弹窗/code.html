<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LX-Music Server Configuration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#0e0e0e",
                        "on-secondary-fixed": "#40000d",
                        "surface-container-low": "#1c1b1b",
                        "primary": "#cffffb",
                        "primary-fixed": "#29fcf3",
                        "secondary": "#ffb2b6",
                        "surface-container-highest": "#353534",
                        "on-surface": "#e5e2e1",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "surface-tint": "#00ddd6",
                        "surface-container-high": "#2a2a2a",
                        "tertiary-fixed": "#e2e2e2",
                        "on-secondary": "#67001b",
                        "surface-bright": "#3a3939",
                        "on-tertiary-fixed": "#1a1c1c",
                        "outline-variant": "#3a4a48",
                        "on-tertiary": "#2f3131",
                        "on-primary-fixed-variant": "#00504d",
                        "on-error": "#690005",
                        "outline": "#849492",
                        "inverse-surface": "#e5e2e1",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-primary": "#003735",
                        "surface-container": "#201f1f",
                        "on-primary-fixed": "#00201e",
                        "error-container": "#93000a",
                        "inverse-primary": "#006a66",
                        "secondary-fixed-dim": "#ffb2b6",
                        "on-tertiary-container": "#5d5f5f",
                        "on-error-container": "#ffdad6",
                        "inverse-on-surface": "#313030",
                        "tertiary": "#f5f5f5",
                        "surface": "#131313",
                        "on-secondary-fixed-variant": "#920029",
                        "surface-dim": "#131313",
                        "primary-container": "#00f2ea",
                        "error": "#ffb4ab",
                        "secondary-fixed": "#ffdadb",
                        "primary-fixed-dim": "#00ddd6",
                        "on-primary-container": "#006a66",
                        "background": "#131313",
                        "secondary-container": "#ff516a",
                        "on-surface-variant": "#b9cac8",
                        "surface-variant": "#353534",
                        "on-secondary-container": "#5b0016",
                        "tertiary-container": "#d9d9d9",
                        "on-background": "#e5e2e1"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "lg": "24px",
                        "base": "4px",
                        "xs": "4px",
                        "xl": "32px",
                        "safe-area-inset": "max(16px, env(safe-area-inset-bottom))",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-sm": ["Inter"],
                        "title-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", { "lineHeight": "52px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "title-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(0, 242, 234, 0.4);
        }
        .neon-glow:hover {
            box-shadow: 0 0 25px rgba(0, 242, 234, 0.6);
        }
        .neon-text-glow {
            text-shadow: 0 0 10px rgba(0, 242, 234, 0.5);
        }
        
        /* Custom Input Styling */
        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--color-on-surface);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--color-primary-fixed-dim);
            outline: none;
            box-shadow: 0 0 0 1px var(--color-primary-fixed-dim);
        }
        .glass-input::placeholder {
            color: var(--color-on-surface-variant);
            opacity: 0.5;
        }

        /* Custom Toggle Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: var(--color-primary-container);
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: var(--color-primary-container);
            box-shadow: 0 0 10px rgba(0, 242, 234, 0.5);
        }
        .toggle-checkbox:checked + .toggle-label:after {
            transform: translateX(100%);
            border-color: white;
        }
        .toggle-label {
            width: 44px;
            height: 24px;
            background-color: var(--color-surface-container-highest);
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .toggle-label:after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background-color: var(--color-on-surface);
            border-radius: 50%;
            transition: transform 0.3s;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-md overflow-hidden relative">
<!-- Abstract Blurred Background Element -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-1/4 left-1/4 w-[600px] h-[600px] bg-primary-fixed-dim/20 rounded-full blur-[120px] mix-blend-screen animate-pulse" style="animation-duration: 8s;"></div>
<div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-secondary-container/10 rounded-full blur-[100px] mix-blend-screen animate-pulse" style="animation-duration: 12s;"></div>
</div>
<!-- Main Modal Container -->
<main class="glass-panel w-full max-w-md rounded-xl p-xl z-10 relative flex flex-col gap-xl">
<!-- Header -->
<header class="flex flex-col items-center gap-sm text-center">
<div class="w-16 h-16 rounded-full bg-surface-container-high border border-primary-fixed-dim/30 flex items-center justify-center mb-sm shadow-[0_0_20px_rgba(0,221,214,0.15)]">
<span class="material-symbols-outlined text-primary-fixed-dim" style="font-size: 32px;">dns</span>
</div>
<h1 class="font-title-md text-title-md text-primary-fixed-dim neon-text-glow">LX-Music Server</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Configure connection parameters</p>
</header>
<!-- Configuration Form -->
<form class="flex flex-col gap-lg" onsubmit="event.preventDefault(); animateConnection();">
<!-- Server Address & Port Group -->
<div class="flex gap-md">
<div class="flex-grow flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="serverAddress">Server Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none text-[20px]">language</span>
<input class="glass-input w-full rounded-lg py-sm pl-[36px] pr-sm font-body-lg text-body-lg" id="serverAddress" placeholder="e.g. 192.168.1.100" type="text" value="music.lx-server.net"/>
</div>
</div>
<div class="w-1/3 flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="serverPort">Port</label>
<input class="glass-input w-full rounded-lg py-sm px-sm font-body-lg text-body-lg text-center" id="serverPort" placeholder="Port" type="text" value="9763"/>
</div>
</div>
<!-- Credentials Group -->
<div class="flex flex-col gap-md">
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="username">Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none text-[20px]">person</span>
<input class="glass-input w-full rounded-lg py-sm pl-[36px] pr-sm font-body-lg text-body-lg" id="username" placeholder="Enter username" type="text"/>
</div>
</div>
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none text-[20px]">lock</span>
<input class="glass-input w-full rounded-lg py-sm pl-[36px] pr-[40px] font-body-lg text-body-lg" id="password" placeholder="Enter password" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary-fixed-dim transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="visibilityIcon">visibility_off</span>
</button>
</div>
</div>
</div>
<!-- Settings Toggles -->
<div class="flex items-center justify-between py-sm mt-xs border-t border-surface-container-highest">
<div class="flex flex-col">
<span class="font-body-lg text-body-lg text-on-surface">HTTPS Encryption</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Secure connection via SSL/TLS</span>
</div>
<div class="relative inline-block w-[44px] mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 opacity-0" id="httpsToggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer" for="httpsToggle"></label>
</div>
</div>
<!-- Action Button -->
<button class="mt-md w-full bg-primary-container text-on-primary-container font-title-md text-title-md py-md rounded-lg flex items-center justify-center gap-sm neon-glow transition-all duration-300 active:scale-[0.98]" id="connectBtn" type="submit">
<span class="material-symbols-outlined" id="btnIcon">cable</span>
<span id="btnText">Connect Server</span>
</button>
</form>
</main>
<script>
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const icon = document.getElementById('visibilityIcon');
            
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                icon.textContent = 'visibility';
            } else {
                pwdInput.type = 'password';
                icon.textContent = 'visibility_off';
            }
        }

        function animateConnection() {
            const btn = document.getElementById('connectBtn');
            const btnIcon = document.getElementById('btnIcon');
            const btnText = document.getElementById('btnText');
            
            // Loading state
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btnIcon.textContent = 'sync';
            btnIcon.classList.add('animate-spin');
            btnText.textContent = 'Connecting...';
            
            // Simulate connection success
            setTimeout(() => {
                btnIcon.classList.remove('animate-spin');
                btnIcon.textContent = 'check_circle';
                btnText.textContent = 'Connected';
                btn.classList.remove('bg-primary-container', 'text-on-primary-container', 'opacity-80', 'cursor-not-allowed');
                btn.classList.add('bg-primary-fixed', 'text-on-primary-fixed');
                
                // Reset after delay
                setTimeout(() => {
                    btnIcon.textContent = 'cable';
                    btnText.textContent = 'Connect Server';
                    btn.classList.remove('bg-primary-fixed', 'text-on-primary-fixed');
                    btn.classList.add('bg-primary-container', 'text-on-primary-container');
                }, 2000);
            }, 1500);
        }
    </script>
</body></html>
