<script>
        // Simple Micro-interaction: Music Visualizer Simulation
        const visualizerContainer = document.getElementById('visualizer');
        const barCount = 30;
        
        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'visualizer-bar';
            bar.style.height = '10%';
            visualizerContainer.appendChild(bar);
        }

        const bars = document.querySelectorAll('.visualizer-bar');
        function animateVisualizer() {
            bars.forEach(bar => {
                const randomHeight = Math.floor(Math.random() * 80) + 10;
                bar.style.height = `${randomHeight}%`;
            });
            setTimeout(animateVisualizer, 150);
        }
        animateVisualizer();

        // Simulate click interaction for Like button
        const likeBtn = document.querySelector('[data-icon="favorite"]').parentElement;
        likeBtn.addEventListener('click', function() {
            const icon = this.querySelector('span');
            if (icon.style.color === 'rgb(255, 81, 106)') { // Pink color
                icon.style.color = '#fff';
                icon.style.fontVariationSettings = "'FILL' 0";
            } else {
                icon.style.color = '#ff516a';
                icon.style.fontVariationSettings = "'FILL' 1";
                // Heart beat effect
                this.classList.add('scale-125');
                setTimeout(() => this.classList.remove('scale-125'), 200);
            }
        });

        // Toggle rotating state on vinyl click
        const vinyl = document.querySelector('.animate-vinyl');
        vinyl.addEventListener('click', () => {
            const isPaused = vinyl.style.animationPlayState === 'paused';
            vinyl.style.animationPlayState = isPaused ? 'running' : 'paused';
        });
    </script>
